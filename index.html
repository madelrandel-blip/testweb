<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Luma Switch</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b0f1a;
color:white;
}

header{
padding:15px;
display:flex;
gap:10px;
background:#111827;
}

button{
padding:8px;
cursor:pointer;
}

.store{
display:grid;
grid-template-columns: repeat(auto-fill, minmax(180px,1fr));
gap:15px;
padding:20px;
}

.card{
background:#1f2937;
border-radius:10px;
overflow:hidden;
}

.card img{width:100%}

.content{padding:10px}

.admin-actions{margin-top:5px}
</style>
</head>

<body>

<header>
<h2>Luma Switch</h2>
<button onclick="abrirLogin()">Admin</button>
<button onclick="logout()" id="logoutBtn" style="display:none;">Salir</button>
</header>

<div id="loginBox" style="display:none;">
<input id="user" placeholder="Usuario">
<input id="pass" type="password" placeholder="Contraseña">
<button onclick="login()">Entrar</button>
</div>

<div id="adminPanel" style="display:none; padding:10px;">
<input id="nombre" placeholder="Nombre">
<input id="img" placeholder="Imagen URL">
<input id="desc" placeholder="Descripción">
<input id="link1" placeholder="Link 1">
<input id="link2" placeholder="Link 2">
<button onclick="agregarJuego()">Guardar</button>
</div>

<div class="store" id="store"></div>

<script>
let admin=false, editIndex=null;

function abrirLogin(){loginBox.style.display="block";}
function login(){
if(user.value==="Mad" && pass.value==="Papel#19"){
admin=true;
adminPanel.style.display="block";
logoutBtn.style.display="inline-block";
cargar();
}
}
function logout(){
admin=false;
adminPanel.style.display="none";
logoutBtn.style.display="none";
cargar();
}
</script>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs, addDoc, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* 🔥 PEGA TU CONFIG AQUÍ */
const firebaseConfig = {
  apiKey: "AIzaSyCnqFKUPqbcTt0As9atnSQML00ReFgcgbw",
  authDomain: "luma-switch.firebaseapp.com",
  projectId: "luma-switch",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.db = db;
window.firestore = { collection, getDocs, addDoc, deleteDoc, doc, updateDoc };

/* ========================= */
/* FUNCIONES FIREBASE */
/* ========================= */

window.cargar = async function(){
store.innerHTML = "";

const querySnapshot = await getDocs(collection(db, "juegos"));

querySnapshot.forEach((docSnap)=>{
const j = docSnap.data();
const id = docSnap.id;

store.innerHTML += `
<div class="card">
<img src="${j.img}">
<div class="content">
<h3>${j.nombre}</h3>
<p>${j.desc}</p>

<a href="${j.link1}">Descargar 1</a><br>
<a href="${j.link2}">Descargar 2</a>

${admin?`
<div class="admin-actions">
<button onclick="editar('${id}','${j.nombre}','${j.img}','${j.desc}','${j.link1}','${j.link2}')">Editar</button>
<button onclick="eliminar('${id}')">Eliminar</button>
</div>`:""}

</div>
</div>`;
});
};

window.agregarJuego = async function(){

let nuevo = {
nombre:nombre.value,
img:img.value,
desc:desc.value,
link1:link1.value,
link2:link2.value
};

if(editIndex == null){
await addDoc(collection(db, "juegos"), nuevo);
}else{
await updateDoc(doc(db,"juegos",editIndex), nuevo);
editIndex = null;
}

cargar();
};

window.editar = function(id,n,i,d,l1,l2){
nombre.value=n;
img.value=i;
desc.value=d;
link1.value=l1;
link2.value=l2;
editIndex=id;
};

window.eliminar = async function(id){
await deleteDoc(doc(db,"juegos",id));
cargar();
};

/* iniciar */
window.onload = ()=>{
cargar();
};

</script>

</body>
</html>
