<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luma Switch</title>

<style>
:root{
    --bg:#05070d;
    --card:#0f172a;
    --text:#e0f2ff;
    --accent:#7dd3fc;
    --accent2:#a78bfa;
    --green:#22c55e;
}

body{
    margin:0;
    font-family:Arial;
    color:var(--text);
    background: radial-gradient(circle at 20% 30%, #1e3a8a, transparent),
                radial-gradient(circle at 80% 70%, #581c87, transparent),
                var(--bg);
}

#stars{position:fixed; inset:0; z-index:0; pointer-events:none;}

header{
    background:rgba(10,15,30,0.7);
    backdrop-filter: blur(10px);
    padding:15px;
    display:flex;
    align-items:center;
    gap:15px;
    position:relative;
    z-index:1;
}

#buscador{
    padding:8px 12px;
    border-radius:10px;
    border:none;
    background:#020617;
    color:white;
    border:1px solid rgba(255,255,255,0.1);
}

.header-btn{margin-left:auto; display:flex; gap:10px;}

.header-btn button{
    padding:8px 14px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    color:white;
}

/* LOGIN */
#loginBox{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.6);
    justify-content:center;
    align-items:center;
    z-index:10;
}
.login-content{
    background:#0f172a;
    padding:25px;
    border-radius:15px;
    width:280px;
    text-align:center;
}
.login-content input{
    width:100%;
    margin:8px 0;
    padding:10px;
}

/* PANEL */
#adminPanel{display:none; padding:20px;}
#adminPanel input{margin:5px; padding:8px;}

.store{
    display:grid;
    grid-template-columns: repeat(auto-fill, minmax(180px,1fr));
    gap:18px;
    padding:20px;
    z-index:1;
    position:relative;
}

.card{
    background:rgba(15,23,42,0.8);
    border-radius:10px;
    overflow:hidden;
    display:flex;
    flex-direction:column;
    transition:0.3s;
}
.card:hover{transform:scale(1.05);}
.card img{width:100%;}

.content{padding:10px; display:flex; flex-direction:column; flex:1;}

.btns{
    display:flex;
    gap:6px;
    margin-top:auto;
    opacity:0;
    transform:translateY(10px);
    transition:0.3s;
}
.card:hover .btns{opacity:1; transform:translateY(0);}

.btn{flex:1; padding:7px; border:none; color:white;}
.blue{background:var(--accent);}
.green{background:var(--green);}

/* PAGINACIÓN */
.paginacion{
    display:flex;
    justify-content:center;
    gap:8px;
    margin:30px 0;
    flex-wrap:wrap;
}
.paginacion button{
    padding:8px 12px;
    border-radius:8px;
    border:none;
    background:#020617;
    color:white;
    cursor:pointer;
}
.paginacion button.activa{
    background:linear-gradient(135deg,var(--accent),var(--accent2));
}
.paginacion span{opacity:0.5;}
</style>
</head>

<body>

<canvas id="stars"></canvas>

<header>
<h2>Luma Switch</h2>
<input type="text" id="buscador" placeholder="Buscar...">
<div class="header-btn">
<button onclick="abrirLogin()">🔐 Admin</button>
<button onclick="logout()" id="logoutBtn" style="display:none;">🚪 Salir</button>
</div>
</header>

<div id="loginBox">
<div class="login-content">
<h3>Admin</h3>
<input id="user">
<input id="pass" type="password">
<button onclick="login()">Entrar</button>
<button onclick="cerrarLogin()">Cerrar</button>
</div>
</div>

<div id="adminPanel">
<input id="nombre" placeholder="Nombre">
<input id="img" placeholder="Imagen">
<input id="desc" placeholder="Descripción">
<input id="link1" placeholder="Link 1">
<input id="link2" placeholder="Link 2">
<button onclick="agregarJuego()">Guardar</button>
</div>

<div class="store" id="store"></div>

<script>
let juegosData = [];
let paginaActual = 1;
const juegosPorPagina = 8;

function juegosFiltrados(){
    const texto = buscador.value.toLowerCase();
    return juegosData.filter(j =>
        j.nombre.toLowerCase().includes(texto) ||
        j.desc.toLowerCase().includes(texto)
    );
}

buscador.addEventListener("input", ()=>{
    paginaActual = 1;
    render(juegosFiltrados());
});

function render(lista){
    const total = Math.ceil(lista.length / juegosPorPagina) || 1;

    const inicio = (paginaActual - 1) * juegosPorPagina;
    const pagina = lista.slice(inicio, inicio + juegosPorPagina);

    let html="";
    pagina.forEach(j=>{
        html+=`
        <div class="card">
        <img src="${j.img}">
        <div class="content">
        <h3>${j.nombre}</h3>
        <p>${j.desc}</p>

        <div class="btns">
        <a href="${j.link1}" target="_blank" class="btn blue">Link 1</a>
        <a href="${j.link2}" target="_blank" class="btn green">Link 2</a>
        </div>

        ${admin?`<button onclick="eliminar('${j.id}')">🗑️</button>`:""}

        </div>
        </div>`;
    });

    store.innerHTML = html;
    renderPaginacion(total);
}

function renderPaginacion(total){
    let html = `<div class="paginacion">`;

    html += `<button onclick="irPagina(${paginaActual-1})" ${paginaActual===1?"disabled":""}>‹</button>`;

    for(let i=1;i<=total;i++){
        if(i===1 || i===total || (i>=paginaActual-1 && i<=paginaActual+1)){
            html += `<button class="${i===paginaActual?"activa":""}" onclick="irPagina(${i})">${i}</button>`;
        }else if(i===paginaActual-2 || i===paginaActual+2){
            html += `<span>...</span>`;
        }
    }

    html += `<button onclick="irPagina(${paginaActual+1})" ${paginaActual===total?"disabled":""}>›</button>`;
    html += `</div>`;

    store.innerHTML += html;
}

function irPagina(p){
    const total = Math.ceil(juegosFiltrados().length / juegosPorPagina);
    if(p<1 || p>total) return;
    paginaActual = p;
    window.scrollTo({top:0,behavior:"smooth"});
    render(juegosFiltrados());
}

function abrirLogin(){loginBox.style.display="flex";}
function cerrarLogin(){loginBox.style.display="none";}
</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs, addDoc, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCnqFKUPqbcTt0As9atnSQML00ReFgcgbw",
  authDomain: "luma-switch.firebaseapp.com",
  projectId: "luma-switch"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let admin=false;

onAuthStateChanged(auth,(user)=>{
    admin=!!user;
    adminPanel.style.display=admin?"block":"none";
    logoutBtn.style.display=admin?"inline":"none";
    cargar();
});

window.login=()=>signInWithEmailAndPassword(auth,user.value,pass.value);
window.logout=()=>signOut(auth);

async function cargar(){
    const snapshot = await getDocs(collection(db,"juegos"));

    juegosData = [];

    snapshot.forEach(docSnap=>{
        const j = docSnap.data();
        j.id = docSnap.id;
        juegosData.push(j);
    });

    paginaActual = 1;
    render(juegosFiltrados());
}

window.agregarJuego=async ()=>{
    await addDoc(collection(db,"juegos"),{
        nombre:nombre.value,
        img:img.value,
        desc:desc.value,
        link1:link1.value,
        link2:link2.value
    });
    cargar();
};

window.eliminar=async(id)=>{
    await deleteDoc(doc(db,"juegos",id));
    cargar();
};
</script>

</body>
</html>
