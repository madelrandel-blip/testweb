<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luma Switch</title>

<style>
:root{
    --bg:#05070d;
    --card:#0f172a;
    --text:#e0f2ff;
    --accent:#7dd3fc;
    --accent2:#a78bfa;
    --green:#22c55e;
}

body{
    margin:0;
    font-family:Arial;
    color:var(--text);
    background: radial-gradient(circle at 20% 30%, #1e3a8a, transparent),
                radial-gradient(circle at 80% 70%, #581c87, transparent),
                var(--bg);
}

/* estrellas */
#stars{
    position:fixed;
    inset:0;
    z-index:0;
    pointer-events:none;
}

/* HEADER */
header{
    background:rgba(10,15,30,0.7);
    backdrop-filter: blur(10px);
    padding:15px;
    display:flex;
    align-items:center;
    gap:15px;
    position:relative;
    z-index:1;
}

.logo h1{
    display:flex;
    align-items:center;
    gap:10px;
    margin:0;
    font-size:20px;
}

.logo-img{
    height:24px;
    width:auto;
}

/* buscador */
#buscador{
    padding:8px 12px;
    border-radius:10px;
    border:none;
    background:#020617;
    color:white;
    border:1px solid rgba(255,255,255,0.1);
    width:200px;
}

.header-btn{
    margin-left:auto;
    display:flex;
    gap:10px;
}

.header-btn button{
    padding:8px 14px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    color:white;
}

/* LOGIN */
#loginBox{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.6);
    backdrop-filter: blur(6px);
    justify-content:center;
    align-items:center;
    z-index:10;
}

.login-content{
    background:rgba(15,23,42,0.9);
    padding:25px;
    border-radius:15px;
    width:280px;
    text-align:center;
}

.login-content input{
    width:100%;
    padding:10px;
    margin:8px 0;
    border-radius:10px;
    border:none;
    background:#020617;
    color:white;
}

.login-content button{
    width:100%;
    padding:10px;
    margin-top:8px;
    border:none;
    border-radius:10px;
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    color:white;
}

/* PANEL */
#adminPanel{
    display:none;
    padding:15px;
}

#adminPanel input{
    margin:5px;
    padding:8px;
}

/* GRID */
.store{
    display:grid;
    grid-template-columns: repeat(auto-fill, minmax(180px,1fr));
    gap:18px;
    padding:20px;
}

/* CARD */
.card{
    background:rgba(15,23,42,0.9);
    border-radius:10px;
    overflow:hidden;
    transition:0.3s;
    position:relative;
}
.card:hover{transform:scale(1.05);}

.card img{width:100%;}

.badge{
    position:absolute;
    top:6px;
    left:6px;
    background:gold;
    color:black;
    padding:3px 6px;
    font-size:10px;
    border-radius:5px;
}

.content{
    padding:10px;
}

.btns{
    display:flex;
    gap:5px;
    margin-top:10px;
}

.btn{
    flex:1;
    padding:6px;
    border:none;
    border-radius:5px;
    color:white;
    cursor:pointer;
}
.blue{background:var(--accent);}
.green{background:var(--green);}

.admin-actions{
    display:flex;
    gap:5px;
    margin-top:5px;
}
</style>

</head>

<body>

<canvas id="stars"></canvas>

<header>
<div class="logo">
<h1>
<img src="https://media.discordapp.net/attachments/1419649387948150826/1496590717789933568/Luma..webp?format=png" class="logo-img">
Luma Switch
</h1>
</div>

<input id="buscador" placeholder="Buscar...">

<div class="header-btn">
<button onclick="abrirLogin()">🔐 Admin</button>
<button onclick="logout()" id="logoutBtn" style="display:none;">🚪 Salir</button>
</div>
</header>

<div id="loginBox">
<div class="login-content">
<h3>Admin</h3>
<input id="user" placeholder="Email">
<input id="pass" type="password" placeholder="Contraseña">
<button onclick="login()">Entrar</button>
<button onclick="cerrarLogin()">Cerrar</button>
</div>
</div>

<div id="adminPanel">
<input id="nombre" placeholder="Nombre">
<input id="img" placeholder="Imagen">
<input id="desc" placeholder="Descripción">
<input id="link1" placeholder="Link 1">
<input id="link2" placeholder="Link 2">
<button onclick="agregarJuego()">Guardar</button>
</div>

<div class="store" id="store"></div>

<script>
function abrirLogin(){loginBox.style.display="flex";}
function cerrarLogin(){loginBox.style.display="none";}

let juegosData=[];
let admin=false;

/* buscador */
buscador.addEventListener("input",()=>{
let t=buscador.value.toLowerCase();
render(juegosData.filter(j=>
(j.nombre||"").toLowerCase().includes(t)||
(j.desc||"").toLowerCase().includes(t)
));
});

/* render */
function render(lista){
let html="";
lista.forEach(j=>{
html+=`
<div class="card">
${j.destacado?'<div class="badge">⭐</div>':''}
<img src="${j.img}">
<div class="content">
<h3>${j.nombre}</h3>
<p>${j.desc}</p>

<div class="btns">
<button class="btn blue" onclick="window.open('${j.link1}')">Link</button>
<button class="btn green" onclick="window.open('${j.link2}')">Link</button>
</div>

${admin?`
<div class="admin-actions">
<button onclick="eliminar('${j.id}')">🗑️</button>
<button onclick="toggleDestacado('${j.id}', ${j.destacado?true:false})">⭐</button>
</div>`:""}

</div>
</div>`;
});
store.innerHTML=html;
}
</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs, addDoc, deleteDoc, doc, updateDoc, query, where } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const app=initializeApp({
apiKey:"AIzaSyCnqFKUPqbcTt0As9atnSQML00ReFgcgbw",
authDomain:"luma-switch.firebaseapp.com",
projectId:"luma-switch"
});

const db=getFirestore(app);
const auth=getAuth(app);

onAuthStateChanged(auth,u=>{
admin=!!u;
adminPanel.style.display=admin?"block":"none";
logoutBtn.style.display=admin?"inline-block":"none";
cargar();
});

window.login=()=>signInWithEmailAndPassword(auth,user.value,pass.value).then(cerrarLogin);
window.logout=()=>signOut(auth);

window.cargar=async()=>{
const snap=await getDocs(collection(db,"juegos"));
juegosData=[];
snap.forEach(d=>{
let j=d.data();
j.id=d.id;
juegosData.push(j);
});

/* orden */
juegosData.sort((a,b)=>{
if((b.destacado?1:0)!==(a.destacado?1:0)){
return (b.destacado?1:0)-(a.destacado?1:0);
}
return (a.nombre||"").localeCompare(b.nombre||"",'es',{sensitivity:'base'});
});

render(juegosData);
};

window.agregarJuego=async()=>{
let nuevo={
nombre:nombre.value,
img:img.value,
desc:desc.value,
link1:link1.value,
link2:link2.value,
destacado:false
};
await addDoc(collection(db,"juegos"),nuevo);
cargar();
};

window.eliminar=id=>deleteDoc(doc(db,"juegos",id)).then(cargar);

window.toggleDestacado=(id,estado)=>{
updateDoc(doc(db,"juegos",id),{destacado:!estado}).then(cargar);
};
</script>

<script>
const c=document.getElementById("stars");
const ctx=c.getContext("2d");

function resize(){c.width=innerWidth;c.height=innerHeight;}
resize();addEventListener("resize",resize);

let stars=Array.from({length:80},()=>({
x:Math.random()*c.width,
y:Math.random()*c.height,
r:Math.random()*1.2,
s:Math.random()*0.3+0.05
}));

function draw(){
ctx.clearRect(0,0,c.width,c.height);
ctx.fillStyle="white";
stars.forEach(st=>{
ctx.beginPath();
ctx.arc(st.x,st.y,st.r,0,Math.PI*2);
ctx.fill();
st.y+=st.s;
if(st.y>c.height){st.y=0;st.x=Math.random()*c.width;}
});
requestAnimationFrame(draw);
}
draw();
</script>

</body>
</html>
