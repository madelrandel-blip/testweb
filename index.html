<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luma Switch</title>

<style>
:root{
    --bg:#0b0f14;
    --card:#1b2838;
    --text:#c7d5e0;
    --accent:#66c0f4;
    --green:#5ba32b;
}

body{
    margin:0;
    font-family:Arial, sans-serif;
    background:var(--bg);
    color:var(--text);
}

/* HEADER */
header{
    background:#171a21;
    padding:15px;
    display:flex;
    flex-wrap:wrap;
    align-items:center;
    gap:15px;
}

.search{
    padding:8px;
    border-radius:5px;
    border:none;
}

.header-btn{
    margin-left:auto;
    display:flex;
    gap:10px;
}

.header-btn button{
    padding:8px 12px;
    border:none;
    border-radius:5px;
    cursor:pointer;
    background:var(--accent);
    color:white;
}

/* LOGIN MODAL */
#loginBox{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.7);
    justify-content:center;
    align-items:center;
    z-index:1000;
}

.login-content{
    background:#1b2838;
    padding:25px;
    border-radius:10px;
    width:300px;
    text-align:center;
}

.login-content input{
    width:90%;
    padding:8px;
    margin:6px 0;
    border:none;
    border-radius:5px;
}

.login-content button{
    margin-top:10px;
    padding:8px 12px;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

/* ADMIN PANEL */
#adminPanel{
    display:none;
    background:#171a21;
    padding:20px;
    border-top:2px solid var(--accent);
}

#adminPanel input{
    padding:8px;
    margin:5px;
    border-radius:5px;
    border:none;
}

.admin-btn{
    background:var(--accent);
    color:white;
    padding:8px;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

/* GRID */
.store{
    display:grid;
    grid-template-columns: repeat(auto-fill, minmax(180px,1fr));
    gap:18px;
    padding:20px;
}

/* CARD */
.card{
    background:var(--card);
    border-radius:6px;
    overflow:hidden;
    transition:0.3s;
    display:flex;
    flex-direction:column;
    height:100%;
}

.card:hover{
    transform:scale(1.04);
}

.card img{
    width:100%;
    display:block;
}

.content{
    padding:10px;
    display:flex;
    flex-direction:column;
    flex:1;
}

.content h3{
    font-size:14px;
    margin:5px 0;
    display:-webkit-box;
    -webkit-line-clamp:2;
    -webkit-box-orient:vertical;
    overflow:hidden;
}

.content p{
    font-size:12px;
    color:#9aa7b1;
}

.btns{
    display:flex;
    gap:6px;
    margin-top:auto;
}

.btn{
    flex:1;
    padding:7px;
    text-align:center;
    font-size:12px;
    border-radius:4px;
    text-decoration:none;
    color:white;
}

.blue{ background:var(--accent); }
.green{ background:var(--green); }

@media(max-width:600px){
    .store{
        grid-template-columns: repeat(2,1fr);
    }
}
</style>
</head>

<body>

<header>
    <h1>🎮 Tienda Switch</h1>
    <input type="text" id="search" class="search" placeholder="Buscar juego...">

    <div class="header-btn">
        <button onclick="abrirLogin()">Admin</button>
        <button onclick="logout()" id="logoutBtn" style="display:none;">Salir</button>
    </div>
</header>

<!-- LOGIN -->
<div id="loginBox">
    <div class="login-content">
        <h3>Admin Login</h3>
        <input id="user" placeholder="Usuario">
        <input id="pass" type="password" placeholder="Contraseña">

        <button onclick="login()">Entrar</button>
        <button onclick="cerrarLogin()">Cerrar</button>
    </div>
</div>

<!-- PANEL ADMIN -->
<div id="adminPanel">
    <h2>Panel Admin</h2>

    <input id="nombre" placeholder="Nombre">
    <input id="img" placeholder="Imagen URL">
    <input id="desc" placeholder="Descripción">
    <input id="link1" placeholder="Link 1">
    <input id="link2" placeholder="Link 2">

    <br>
    <button class="admin-btn" onclick="agregarJuego()">Guardar Juego</button>
</div>

<div class="store" id="store"></div>

<script>
let admin=false;
let editIndex=null;

// LOGIN
function abrirLogin(){
    document.getElementById("loginBox").style.display="flex";
}
function cerrarLogin(){
    document.getElementById("loginBox").style.display="none";
}
function login(){
    let u=document.getElementById("user").value;
    let p=document.getElementById("pass").value;

    if(u==="Mad" && p==="Papel#19"){
        admin=true;
        document.getElementById("adminPanel").style.display="block";
        document.getElementById("logoutBtn").style.display="inline-block";
        cerrarLogin();
        cargar();
    }else{
        alert("Datos incorrectos");
    }
}
function logout(){
    admin=false;
    document.getElementById("adminPanel").style.display="none";
    document.getElementById("logoutBtn").style.display="none";
    cargar();
}

// LISTA ORIGINAL
const juegos = [
{nombre:"The Legend of Zelda: Breath of the Wild", img:"https://art.gametdb.com/switch/box2/US/AAAAA.png", desc:"Mundo abierto", link1:"#", link2:"#"},
{nombre:"The Legend of Zelda: Tears of the Kingdom", img:"https://art.gametdb.com/switch/box/US/AXN7A.png", desc:"Aventura", link1:"#", link2:"#"},
{nombre:"The Legend of Zelda: Skyward Sword", img:"https://art.gametdb.com/switch/box/US/AZ89A.png?1696859490", desc:"Aventura", link1:"https://www.mediafire.com/file/zl5eumnm7kgq5iw/The+Legend+of+Zelda+Skyward+Sword+HD+[v1.0.1].nsp/file", link2:"#"},
{nombre:"Mario Kart 8 Deluxe", img:"https://art.gametdb.com/switch/box/US/AABPA.png", desc:"Carreras", link1:"#", link2:"#"},
{nombre:"Super Smash Bros Ultimate", img:"https://art.gametdb.com/switch/box/MX/AAABA.png", desc:"Lucha", link1:"#", link2:"#"},
{nombre:"Mario Odyssey", img:"https://art.gametdb.com/switch/box/US/AAACA.png", desc:"Aventura", link1:"#", link2:"#"},
{nombre:"Pokemon Scarlet", img:"https://art.gametdb.com/switch/box/US/ALZXA.png", desc:"Pokemon", link1:"#", link2:"#"},
{nombre:"Animal Crossing New Horizons", img:"https://art.gametdb.com/switch/box/US/ACBAA.png", desc:"Simulación", link1:"#", link2:"#"},
{nombre:"Metroid Dread", img:"https://art.gametdb.com/switch/box/US/AYL8A.png", desc:"Acción", link1:"#", link2:"#"},
{nombre:"Kirby Forgotten Land", img:"https://art.gametdb.com/switch/box/US/ARZGA.png", desc:"Plataformas", link1:"#", link2:"#"},
{nombre:"Minecraft", img:"https://art.gametdb.com/switch/box/US/AEUCA.png", desc:"Sandbox", link1:"#", link2:"#"},
{nombre:"Super Mario 3D World + Bowser's Fury", img:"https://art.gametdb.com/switch/box/US/AUZPA.png", desc:"Cooperativo", link1:"#", link2:"#"},
{nombre:"Tomodachi Life Living the Dream", img:"https://art.gametdb.com/switch/box/CA/BLFGA.png?1775153578", desc:"Simulador", link1:"https://gofile.io/d/yq4GNq", link2:"#"},
];

// CARGAR
function cargar(){
    let cont=document.getElementById("store");
    cont.innerHTML="";

    juegos.forEach((j,i)=>{
        let card=document.createElement("div");
        card.className="card";

        card.innerHTML=`
            <img src="${j.img}">
            <div class="content">
                <h3>${j.nombre}</h3>
                <p>${j.desc}</p>

                <div class="btns">
                    <a href="${j.link1}" class="btn blue">Descargar</a>
                    <a href="${j.link2}" class="btn green">Descargar</a>
                </div>

                ${admin ? `
                <div style="margin-top:8px; display:flex; gap:5px;">
                    <button onclick="editar(${i})">✏️</button>
                    <button onclick="eliminar(${i})">🗑️</button>
                </div>` : ""}
            </div>
        `;

        cont.appendChild(card);
    });
}
cargar();

// CRUD
function agregarJuego(){
    let nuevo={
        nombre:nombre.value,
        img:img.value,
        desc:desc.value,
        link1:link1.value,
        link2:link2.value
    };

    if(editIndex===null){
        juegos.push(nuevo);
    }else{
        juegos[editIndex]=nuevo;
        editIndex=null;
    }

    cargar();
}

function editar(i){
    let j=juegos[i];
    nombre.value=j.nombre;
    img.value=j.img;
    desc.value=j.desc;
    link1.value=j.link1;
    link2.value=j.link2;
    editIndex=i;
}

function eliminar(i){
    juegos.splice(i,1);
    cargar();
}

// BUSCADOR
search.addEventListener("keyup", e=>{
    let val=e.target.value.toLowerCase();

    document.querySelectorAll(".card").forEach(c=>{
        c.style.display = c.innerText.toLowerCase().includes(val) ? "block":"none";
    });
});
</script>

</body>
</html>
```
