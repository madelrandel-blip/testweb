<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luma Switch</title>

<style>
:root{
    --bg:#05070d;
    --card:#0f172a;
    --text:#e0f2ff;
    --accent:#7dd3fc;
    --accent2:#a78bfa;
    --green:#22c55e;
}

body{
    margin:0;
    font-family:Arial;
    color:var(--text);
    background: radial-gradient(circle at 20% 30%, #1e3a8a, transparent),
                radial-gradient(circle at 80% 70%, #581c87, transparent),
                var(--bg);
}

/* HEADER */
header{
    background:rgba(10,15,30,0.7);
    backdrop-filter: blur(10px);
    padding:15px;
    display:flex;
    align-items:center;
}

.header-btn{
    margin-left:auto;
    display:flex;
    gap:10px;
}

.header-btn button{
    padding:8px 14px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    color:white;
    transition:0.25s;
}
.header-btn button:hover{
    transform:scale(1.08);
    box-shadow:0 0 10px var(--accent);
}

/* LOGIN */
#loginBox{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.85);
    justify-content:center;
    align-items:center;
}

.login-content{
    background:#0f172a;
    padding:25px;
    border-radius:15px;
    text-align:center;
    width:280px;
}

.login-content input{
    width:90%;
    padding:10px;
    margin:8px 0;
    border:none;
    border-radius:8px;
}

.btn-login{
    background:linear-gradient(135deg,#38bdf8,#6366f1);
    border:none;
    padding:10px;
    border-radius:10px;
    color:white;
    cursor:pointer;
}

.btn-close{
    background:rgba(255,255,255,0.1);
    border:none;
    padding:10px;
    border-radius:10px;
    color:white;
    cursor:pointer;
}

/* GRID */
.store{
    display:grid;
    grid-template-columns: repeat(auto-fill, minmax(180px,1fr));
    gap:18px;
    padding:20px;
}

/* CARD */
.card{
    background:rgba(15,23,42,0.8);
    border-radius:10px;
    overflow:hidden;
    transition:0.3s;
    display:flex;
    flex-direction:column;
}
.card:hover{transform:scale(1.05);}
.card img{width:100%;}

/* CONTENT */
.content{
    padding:10px;
    display:flex;
    flex-direction:column;
    flex:1;
}

.content h3{font-size:14px;}
.content p{font-size:12px;color:#9aa7b1;}

/* BOTONES */
.btns{
    display:flex;
    gap:6px;
    margin-top:auto;
    opacity:0;
    transform:translateY(10px);
    transition:0.3s;
}
.card:hover .btns{
    opacity:1;
    transform:translateY(0);
}

.btn{
    flex:1;
    padding:7px;
    font-size:12px;
    border-radius:5px;
    color:white;
    border:none;
    cursor:pointer;
}

.blue{background:var(--accent);}
.green{background:var(--green);}

.admin-actions{
    display:flex;
    gap:5px;
    margin-top:5px;
}

.admin-actions button{
    border:none;
    padding:5px;
    border-radius:6px;
    cursor:pointer;
    background:rgba(255,255,255,0.1);
}

/* 🔥 POPUP EDITOR */
#editorPopup{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.8);
    justify-content:center;
    align-items:center;
    z-index:999;
}

.editor-box{
    background:#0f172a;
    padding:20px;
    border-radius:15px;
    width:300px;
    box-shadow:0 0 20px black;
}

.editor-box input{
    width:100%;
    padding:10px;
    margin:6px 0;
    border:none;
    border-radius:8px;
}

.editor-actions{
    display:flex;
    gap:10px;
    margin-top:10px;
}

.editor-save{
    flex:1;
    background:linear-gradient(135deg,#22c55e,#16a34a);
    border:none;
    padding:10px;
    border-radius:10px;
    color:white;
    cursor:pointer;
}

.editor-cancel{
    flex:1;
    background:#334155;
    border:none;
    padding:10px;
    border-radius:10px;
    color:white;
    cursor:pointer;
}
</style>
</head>

<body>

<header>
<h1>🌌 Luma Switch</h1>
<div class="header-btn">
<button onclick="abrirLogin()">🔐 Admin</button>
<button onclick="logout()" id="logoutBtn" style="display:none;">🚪 Salir</button>
</div>
</header>

<!-- LOGIN -->
<div id="loginBox">
<div class="login-content">
<input id="user" placeholder="Email">
<input id="pass" type="password" placeholder="Contraseña">
<button class="btn-login" onclick="login()">Entrar</button>
<button class="btn-close" onclick="cerrarLogin()">Cerrar</button>
</div>
</div>

<!-- 🔥 EDITOR POPUP -->
<div id="editorPopup">
<div class="editor-box">
<h3>Editar juego</h3>
<input id="e_nombre">
<input id="e_img">
<input id="e_desc">
<input id="e_link1">
<input id="e_link2">

<div class="editor-actions">
<button class="editor-save" onclick="guardarEdicion()">Guardar</button>
<button class="editor-cancel" onclick="cerrarEditor()">Cancelar</button>
</div>
</div>
</div>

<div class="store" id="store"></div>

<script>
function abrirLogin(){loginBox.style.display="flex";}
function cerrarLogin(){loginBox.style.display="none";}

let admin=false;
let editIndex=null;
</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs, addDoc, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "TU_API",
  authDomain: "TU_AUTH",
  projectId: "TU_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

onAuthStateChanged(auth, (user) => {
  admin = !!user;
  logoutBtn.style.display = admin ? "inline-block" : "none";
  cargar();
});

window.login = async ()=>{
await signInWithEmailAndPassword(auth,user.value,pass.value);
cerrarLogin();
};

window.logout = async ()=>{
await signOut(auth);
};

window.cargar = async ()=>{
const snapshot=await getDocs(collection(db,"juegos"));
let html="";

snapshot.forEach(docSnap=>{
const j=docSnap.data();
const id=docSnap.id;

html+=`
<div class="card">
<img src="${j.img}">
<div class="content">
<h3>${j.nombre}</h3>
<p>${j.desc}</p>

<div class="btns">
<button class="btn blue">Descargar</button>
<button class="btn green">Descargar</button>
</div>

${admin?`
<div class="admin-actions">
<button onclick="abrirEditor('${id}','${j.nombre}','${j.img}','${j.desc}','${j.link1}','${j.link2}')">✏️</button>
<button onclick="eliminar('${id}')">🗑️</button>
</div>`:""}

</div>
</div>`;
});

store.innerHTML=html;
};

/* 🔥 EDITOR FUNCIONAL */
window.abrirEditor=(id,n,i,d,l1,l2)=>{
editIndex=id;
e_nombre.value=n;
e_img.value=i;
e_desc.value=d;
e_link1.value=l1;
e_link2.value=l2;
editorPopup.style.display="flex";
};

window.cerrarEditor=()=>{
editorPopup.style.display="none";
editIndex=null;
};

window.guardarEdicion=async()=>{
await updateDoc(doc(db,"juegos",editIndex),{
nombre:e_nombre.value,
img:e_img.value,
desc:e_desc.value,
link1:e_link1.value,
link2:e_link2.value
});
cerrarEditor();
cargar();
};

window.eliminar=async(id)=>{
await deleteDoc(doc(db,"juegos",id));
cargar();
};
</script>

</body>
</html>
