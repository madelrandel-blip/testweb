<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luma Switch</title>

<style>
:root{
    --bg:#05070d;
    --card:#0f172a;
    --text:#e0f2ff;
    --accent:#7dd3fc;
    --accent2:#a78bfa;
    --green:#22c55e;
}

body{
    margin:0;
    font-family:Arial;
    color:var(--text);
    background: radial-gradient(circle at 20% 30%, #1e3a8a, transparent),
                radial-gradient(circle at 80% 70%, #581c87, transparent),
                var(--bg);
}

#stars{
    position:fixed;
    inset:0;
    z-index:0;
    pointer-events:none;
}

header{
    background:rgba(10,15,30,0.7);
    backdrop-filter: blur(10px);
    padding:15px;
    display:flex;
    align-items:center;
    position:relative;
    z-index:1;
    gap:15px;
}

#buscador{
    padding:8px 12px;
    border-radius:10px;
    border:none;
    background:#020617;
    color:white;
    border:1px solid rgba(255,255,255,0.1);
}

.header-btn{
    margin-left:auto;
    display:flex;
    gap:10px;
}

.header-btn button{
    padding:8px 14px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    color:white;
}

.store{
    display:grid;
    grid-template-columns: repeat(auto-fill, minmax(180px,1fr));
    gap:18px;
    padding:20px;
    position:relative;
    z-index:1;
}

.card{
    background:rgba(15,23,42,0.8);
    border-radius:10px;
    overflow:hidden;
    transition:0.3s;
    display:flex;
    flex-direction:column;
}
.card:hover{transform:scale(1.05);}
.card img{width:100%;}

.content{
    padding:10px;
    display:flex;
    flex-direction:column;
    flex:1;
}

.btns{
    display:flex;
    gap:6px;
    margin-top:auto;
    opacity:0;
    transform:translateY(10px);
    transition:0.3s;
}
.card:hover .btns{
    opacity:1;
    transform:translateY(0);
}

.btn{
    flex:1;
    padding:7px;
    font-size:12px;
    border-radius:5px;
    color:white;
    border:none;
}
.blue{background:var(--accent);}
.green{background:var(--green);}

/* PAGINACIÓN PRO */
.paginacion{
    display:flex;
    justify-content:center;
    gap:8px;
    margin:30px 0;
    flex-wrap:wrap;
}
.paginacion button{
    padding:8px 12px;
    border-radius:8px;
    border:none;
    background:#020617;
    color:white;
    cursor:pointer;
}
.paginacion button.activa{
    background:linear-gradient(135deg,var(--accent),var(--accent2));
}
.paginacion span{opacity:0.5;}
</style>
</head>

<body>

<canvas id="stars"></canvas>

<header>
<h2>Luma Switch</h2>
<input type="text" id="buscador" placeholder="Buscar...">
</header>

<div class="store" id="store"></div>

<script>
let juegosData = [];
let paginaActual = 1;
const juegosPorPagina = 8;

function juegosFiltrados(){
    const texto = buscador.value.toLowerCase();
    return juegosData.filter(j =>
        j.nombre.toLowerCase().includes(texto) ||
        j.desc.toLowerCase().includes(texto)
    );
}

buscador.addEventListener("input", ()=>{
    paginaActual = 1;
    render(juegosFiltrados());
});

function render(lista){
    const totalPaginas = Math.ceil(lista.length / juegosPorPagina) || 1;

    if(paginaActual > totalPaginas) paginaActual = totalPaginas;

    const inicio = (paginaActual - 1) * juegosPorPagina;
    const fin = inicio + juegosPorPagina;

    const pagina = lista.slice(inicio, fin);

    let html = "";

    pagina.forEach(j=>{
        html+=`
        <div class="card">
        <img src="${j.img}">
        <div class="content">
        <h3>${j.nombre}</h3>
        <p>${j.desc}</p>

        <div class="btns">
        <a href="${j.link1}" target="_blank" class="btn blue">Link 1</a>
        <a href="${j.link2}" target="_blank" class="btn green">Link 2</a>
        </div>

        </div>
        </div>`;
    });

    store.innerHTML = html;
    renderPaginacion(totalPaginas);
}

function renderPaginacion(total){
    let html = `<div class="paginacion">`;

    html += `<button onclick="irPagina(${paginaActual-1})" ${paginaActual===1?"disabled":""}>‹</button>`;

    for(let i=1;i<=total;i++){
        if(i===1 || i===total || (i>=paginaActual-1 && i<=paginaActual+1)){
            html += `<button class="${i===paginaActual?"activa":""}" onclick="irPagina(${i})">${i}</button>`;
        }else if(i===paginaActual-2 || i===paginaActual+2){
            html += `<span>...</span>`;
        }
    }

    html += `<button onclick="irPagina(${paginaActual+1})" ${paginaActual===total?"disabled":""}>›</button>`;
    html += `</div>`;

    store.innerHTML += html;
}

function irPagina(p){
    const total = Math.ceil(juegosFiltrados().length / juegosPorPagina);
    if(p < 1 || p > total) return;

    paginaActual = p;
    window.scrollTo({top:0, behavior:"smooth"});
    render(juegosFiltrados());
}

/* DEMO DATA (puedes borrar esto cuando uses Firebase) */
juegosData = Array.from({length:40}, (_,i)=>({
    nombre:"Juego "+(i+1),
    desc:"Descripción del juego "+(i+1),
    img:"https://via.placeholder.com/300x400",
    link1:"#",
    link2:"#"
}));

render(juegosFiltrados());
</script>

</body>
</html>
