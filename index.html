<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luma Switch</title>

<style>
:root{
    --bg:#05070d;
    --card:#0f172a;
    --text:#e0f2ff;
    --accent:#7dd3fc;
    --accent2:#a78bfa;
    --green:#22c55e;
}

body{
    margin:0;
    font-family:Arial;
    color:var(--text);
    background: radial-gradient(circle at 20% 30%, #1e3a8a, transparent),
                radial-gradient(circle at 80% 70%, #581c87, transparent),
                var(--bg);
}

/* CANVAS */
#stars{
    position:fixed;
    inset:0;
    z-index:0;
    pointer-events:none;
}

/* HEADER */
header{
    background:rgba(10,15,30,0.7);
    backdrop-filter: blur(10px);
    padding:15px;
    display:flex;
    align-items:center;
    gap:15px;
    position:relative;
    z-index:1;
}

#buscador{
    padding:8px 12px;
    border-radius:10px;
    border:none;
    background:#020617;
    color:white;
    width:200px;
}

.header-btn{
    margin-left:auto;
    display:flex;
    gap:10px;
}

.header-btn button{
    padding:8px 14px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    color:white;
}

/* LOGIN */
#loginBox{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.6);
    backdrop-filter: blur(6px);
    justify-content:center;
    align-items:center;
    z-index:10;
}

.login-content{
    background:rgba(15,23,42,0.9);
    padding:25px;
    border-radius:15px;
    width:300px;
}

/* PANEL */
#adminPanel{
    display:none;
    padding:20px;
    position:relative;
    z-index:1;
}

/* GRID */
.store{
    display:grid;
    grid-template-columns: repeat(auto-fill, minmax(180px,1fr));
    gap:18px;
    padding:20px;
    position:relative;
    z-index:1;
}

/* CARD */
.card{
    background:rgba(15,23,42,0.8);
    border-radius:10px;
    overflow:hidden;
    display:flex;
    flex-direction:column;
}

.card img{
    width:100%;
    height:120px;
    object-fit:cover;
}

.content{
    padding:10px;
    display:flex;
    flex-direction:column;
}

/* FIX REAL (no rompe nada) */
.content h3{
    font-size:14px;
    margin:5px 0;
    line-height:1.2;
    max-height:34px;
    overflow:hidden;
}

.content p{
    font-size:12px;
    color:#9aa7b1;
    line-height:1.2;
    max-height:30px;
    overflow:hidden;
}

.btns{
    display:flex;
    gap:6px;
    margin-top:auto;
    opacity:0;
    transform:translateY(10px);
    transition:0.3s;
}

.card:hover .btns{
    opacity:1;
    transform:translateY(0);
}

.btn{
    flex:1;
    padding:7px;
    font-size:12px;
    border:none;
    color:white;
    cursor:pointer;
}

.blue{background:var(--accent);}
.green{background:var(--green);}
</style>
</head>

<body>

<canvas id="stars"></canvas>

<header>
<h1>🌌 Luma Switch</h1>
<input type="text" id="buscador" placeholder="Buscar...">
<div class="header-btn">
<button onclick="cargarCategoria('juegos')">🏠 Juegos</button>
<button onclick="cargarCategoria('bios')">🧬 Bios/Keys</button>
<button onclick="cargarCategoria('emuladores')">🎮 Emuladores</button>
<button onclick="abrirLogin()">🔐 Admin</button>
<button onclick="logout()" id="logoutBtn" style="display:none;">🚪 Salir</button>
</div>
</header>

<div id="loginBox">
<div class="login-content">
<h3>Panel Admin</h3>
<input id="user" placeholder="Email">
<input id="pass" type="password" placeholder="Contraseña">
<button onclick="login()">Entrar</button>
<button onclick="cerrarLogin()">Cerrar</button>
</div>
</div>

<div id="adminPanel">
<input id="nombre" placeholder="Nombre">
<input id="img" placeholder="Imagen URL">
<input id="desc" placeholder="Descripción">
<input id="link1" placeholder="Link 1">
<input id="link2" placeholder="Link 2">
<button id="btnGuardar" onclick="agregarJuego()">Guardar</button>
</div>

<div class="store" id="store"></div>

<script>
function abrirLogin(){loginBox.style.display="flex";}
function cerrarLogin(){loginBox.style.display="none";}

let juegosData=[];

buscador.addEventListener("input", ()=>{
    const texto = buscador.value.toLowerCase();
    render(juegosData.filter(j =>
        j.nombre.toLowerCase().includes(texto) ||
        j.desc.toLowerCase().includes(texto)
    ));
});

function render(lista){
    let html="";
    lista.forEach(j=>{
        html+=`
        <div class="card">
            <img src="${j.img}">
            <div class="content">
                <h3>${j.nombre}</h3>
                <p>${j.desc}</p>
                <div class="btns">
                    <button class="btn blue">Ver enlace</button>
                    <button class="btn green">Ver enlace</button>
                </div>
            </div>
        </div>`;
    });
    store.innerHTML=html;
}
</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSy...",
  authDomain: "luma-switch.firebaseapp.com",
  projectId: "luma-switch"
});

const db = getFirestore(app);

async function cargar(){
    const snap=await getDocs(collection(db,"juegos"));
    juegosData=[];
    snap.forEach(d=>{
        let j=d.data();
        j.id=d.id;
        juegosData.push(j);
    });
    render(juegosData);
}

cargar();
</script>

<script>
const canvas=document.getElementById("stars");
const ctx=canvas.getContext("2d");

function resize(){
    canvas.width=innerWidth;
    canvas.height=innerHeight;
}
resize();
window.onresize=resize;

let stars=Array.from({length:80},()=>({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    r:Math.random()*1.2,
    s:Math.random()*0.3
}));

function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle="white";
    stars.forEach(s=>{
        ctx.beginPath();
        ctx.arc(s.x,s.y,s.r,0,6.28);
        ctx.fill();
        s.y+=s.s;
        if(s.y>canvas.height){s.y=0;}
    });
    requestAnimationFrame(draw);
}
draw();
</script>

</body>
</html>
