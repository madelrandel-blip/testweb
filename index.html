<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luma Switch</title>

<style>
:root{
    --bg:#05070d;
    --card:#0f172a;
    --text:#e0f2ff;
    --accent:#7dd3fc;
    --accent2:#a78bfa;
    --green:#22c55e;
}

body{
    margin:0;
    font-family:Arial;
    color:var(--text);
    background: radial-gradient(circle at 20% 30%, #1e3a8a, transparent),
                radial-gradient(circle at 80% 70%, #581c87, transparent),
                var(--bg);
}

/* estrellas */
.stars{position:fixed;width:100%;height:100%;z-index:-1;}
.star{position:absolute;width:2px;height:2px;background:white;animation: twinkle 2s infinite alternate;}
@keyframes twinkle{from{opacity:0.2;}to{opacity:1;}}

/* header */
header{
    background:rgba(10,15,30,0.7);
    backdrop-filter: blur(10px);
    padding:15px;
    display:flex;
    gap:15px;
    align-items:center;
}

.header-btn{
    margin-left:auto;
    display:flex;
    gap:10px;
}

.header-btn button{
    padding:8px 14px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    background:linear-gradient(45deg,var(--accent),var(--accent2));
    color:white;
}

/* animación */
.fade{
    animation:fadeIn 0.35s ease;
}
@keyframes fadeIn{
    from{opacity:0; transform:translateY(10px);}
    to{opacity:1; transform:translateY(0);}
}

/* login */
#loginBox{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.8);
    justify-content:center;
    align-items:center;
}
.login-content{
    background:#0f172a;
    padding:25px;
    border-radius:10px;
    text-align:center;
}

/* panel */
#adminPanel{
    display:none;
    background:rgba(10,15,30,0.8);
    padding:20px;
}

/* grid */
.store{
    display:grid;
    grid-template-columns: repeat(auto-fill, minmax(180px,1fr));
    gap:18px;
    padding:20px;
}

/* card */
.card{
    background:rgba(15,23,42,0.8);
    border-radius:10px;
    overflow:hidden;
    transition:0.3s;
    display:flex;
    flex-direction:column;
}
.card:hover{transform:scale(1.05);}
.card img{width:100%;}

/* contenido */
.content{
    padding:10px;
    display:flex;
    flex-direction:column;
    flex:1;
}
.content h3{font-size:14px;margin:5px 0;}
.content p{font-size:12px;color:#9aa7b1;}

/* botones animados */
.btns{
    display:flex;
    gap:6px;
    margin-top:auto;
    opacity:0;
    transform:translateY(10px);
    transition:0.3s;
}
.card:hover .btns{
    opacity:1;
    transform:translateY(0);
}

.btn{
    flex:1;
    padding:7px;
    text-align:center;
    font-size:12px;
    border-radius:5px;
    text-decoration:none;
    color:white;
}
.blue{background:var(--accent);}
.green{background:var(--green);}

.admin-actions{
    display:flex;
    gap:5px;
    margin-top:5px;
}
</style>
</head>

<body>

<div class="stars" id="stars"></div>

<header>
<h1>🌌 Luma Switch</h1>
<div class="header-btn">
<button onclick="abrirLogin()">🔐 Admin</button>
<button onclick="logout()" id="logoutBtn" style="display:none;">🚪 Salir</button>
</div>
</header>

<!-- LOGIN -->
<div id="loginBox">
<div class="login-content">
<input id="user" placeholder="Email">
<input id="pass" type="password" placeholder="Contraseña">
<button onclick="login()">Entrar</button>
</div>
</div>

<!-- PANEL -->
<div id="adminPanel">
<input id="nombre" placeholder="Nombre">
<input id="img" placeholder="Imagen URL">
<input id="desc" placeholder="Descripción">
<input id="link1" placeholder="Link 1">
<input id="link2" placeholder="Link 2">
<button onclick="agregarJuego()">Guardar</button>
</div>

<div class="store fade" id="store"></div>

<script>
// estrellas
for(let i=0;i<120;i++){
let s=document.createElement("div");
s.className="star";
s.style.top=Math.random()*100+"%";
s.style.left=Math.random()*100+"%";
stars.appendChild(s);
}

let admin=false, editIndex=null;

// abrir login
function abrirLogin(){loginBox.style.display="flex";}
</script>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs, addDoc, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

/* 🔥 CONFIG */
const firebaseConfig = {
  apiKey: "AQUI",
  authDomain: "AQUI",
  projectId: "AQUI",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

/* 🔐 ESTADO LOGIN */
onAuthStateChanged(auth, (user) => {
  if(user){
    admin = true;
    adminPanel.style.display = "block";
    logoutBtn.style.display = "inline-block";
  }else{
    admin = false;
    adminPanel.style.display = "none";
    logoutBtn.style.display = "none";
  }
  cargar();
});

/* LOGIN */
window.login = async function(){
try{
await signInWithEmailAndPassword(auth, user.value, pass.value);
loginBox.style.display="none";
}catch(e){
alert("Error: " + e.message);
}
};

/* LOGOUT */
window.logout = async function(){
await signOut(auth);
};

/* CRUD */

window.cargar = async function(){
store.innerHTML = "";
const querySnapshot = await getDocs(collection(db, "juegos"));

querySnapshot.forEach((docSnap)=>{
const j = docSnap.data();
const id = docSnap.id;

store.innerHTML += `
<div class="card">
<img src="${j.img}">
<div class="content">
<h3>${j.nombre}</h3>
<p>${j.desc}</p>

<div class="btns">
<a href="${j.link1}" class="btn blue">Descargar</a>
<a href="${j.link2}" class="btn green">Descargar</a>
</div>

${admin?`
<div class="admin-actions">
<button onclick="editar('${id}','${j.nombre}','${j.img}','${j.desc}','${j.link1}','${j.link2}')">✏️</button>
<button onclick="eliminar('${id}')">🗑️</button>
</div>`:""}

</div>
</div>`;
});
};

window.agregarJuego = async function(){
let nuevo = {
nombre:nombre.value,
img:img.value,
desc:desc.value,
link1:link1.value,
link2:link2.value
};

if(editIndex == null){
await addDoc(collection(db, "juegos"), nuevo);
}else{
await updateDoc(doc(db,"juegos",editIndex), nuevo);
editIndex = null;
}
cargar();
};

window.editar = function(id,n,i,d,l1,l2){
nombre.value=n;
img.value=i;
desc.value=d;
link1.value=l1;
link2.value=l2;
editIndex=id;
};

window.eliminar = async function(id){
await deleteDoc(doc(db,"juegos",id));
cargar();
};

window.onload = ()=>{
cargar();
};
</script>

</body>
</html>
