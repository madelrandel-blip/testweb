<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Luma Switch</title>

<style>
/* TODO TU CSS ORIGINAL SIN CAMBIOS */
:root{
    --bg:#05070d;
    --card:#0f172a;
    --text:#e0f2ff;
    --accent:#7dd3fc;
    --accent2:#a78bfa;
    --green:#22c55e;
}

body{
    margin:0;
    font-family:Arial;
    color:var(--text);
    background: radial-gradient(circle at 20% 30%, #1e3a8a, transparent),
                radial-gradient(circle at 80% 70%, #581c87, transparent),
                var(--bg);
}

.stars{position:fixed;width:100%;height:100%;z-index:-1;}
.star{position:absolute;width:2px;height:2px;background:white;animation: twinkle 2s infinite alternate;}
@keyframes twinkle{from{opacity:0.2;}to{opacity:1;}}

header{
    background:rgba(10,15,30,0.7);
    backdrop-filter: blur(10px);
    padding:15px;
    display:flex;
    gap:15px;
    align-items:center;
}

.search{padding:8px;border-radius:5px;border:none;}

.header-btn{
    margin-left:auto;
    display:flex;
    gap:10px;
}

.header-btn button{
    padding:8px 14px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    background:linear-gradient(45deg,var(--accent),var(--accent2));
    color:white;
    display:flex;
    align-items:center;
    gap:6px;
}

.store{
    display:grid;
    grid-template-columns: repeat(auto-fill, minmax(180px,1fr));
    gap:18px;
    padding:20px;
}

.card{
    background:rgba(15,23,42,0.8);
    border-radius:10px;
    overflow:hidden;
    transition:0.3s;
    display:flex;
    flex-direction:column;
}
.card:hover{transform:scale(1.05);}
.card img{width:100%;}

.content{
    padding:10px;
    display:flex;
    flex-direction:column;
    flex:1;
}

.btn{
    padding:7px;
    border-radius:5px;
    text-decoration:none;
    color:white;
    display:inline-block;
    margin-top:5px;
}
.blue{background:var(--accent);}
.green{background:var(--green);}
</style>
</head>

<body>

<div class="stars" id="stars"></div>

<header>
<h1>🌌 Luma Switch</h1>

<div class="header-btn">
<button onclick="abrirLogin()">🔐 Admin</button>
<button onclick="logout()" id="logoutBtn" style="display:none;">🚪 Salir</button>
</div>
</header>

<!-- LOGIN -->
<div id="loginBox" style="display:none;">
<input id="user" placeholder="Usuario">
<input id="pass" type="password" placeholder="Contraseña">
<button onclick="login()">Entrar</button>
</div>

<!-- PANEL -->
<div id="adminPanel" style="display:none; padding:10px;">
<input id="nombre" placeholder="Nombre">
<input id="img" placeholder="Imagen URL">
<input id="desc" placeholder="Descripción">
<input id="link1" placeholder="Link 1">
<input id="link2" placeholder="Link 2">
<button onclick="agregarJuego()">Guardar</button>
</div>

<div class="store" id="store"></div>

<script>
// estrellas
for(let i=0;i<120;i++){
let s=document.createElement("div");
s.className="star";
s.style.top=Math.random()*100+"%";
s.style.left=Math.random()*100+"%";
stars.appendChild(s);
}

// login simple (igual que antes)
let admin=false, editIndex=null;

function abrirLogin(){loginBox.style.display="block";}
function login(){
if(user.value==="Mad" && pass.value==="Papel#19"){
admin=true;
adminPanel.style.display="block";
logoutBtn.style.display="inline-block";
cargar();
}
}
function logout(){
admin=false;
adminPanel.style.display="none";
logoutBtn.style.display="none";
cargar();
}
</script>

<!-- 🔥 FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs, addDoc, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* ⚠️ PEGA TU CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyCnqFKUPqbcTt0As9atnSQML00ReFgcgbw",
  authDomain: "luma-switch.firebaseapp.com",
  projectId: "luma-switch",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* ========================= */
/* FUNCIONES */
/* ========================= */

window.cargar = async function(){
store.innerHTML = "";

const querySnapshot = await getDocs(collection(db, "juegos"));

querySnapshot.forEach((docSnap)=>{
const j = docSnap.data();
const id = docSnap.id;

store.innerHTML += `
<div class="card">
<img src="${j.img}">
<div class="content">
<h3>${j.nombre}</h3>
<p>${j.desc}</p>

<a href="${j.link1}" class="btn blue">Descargar</a>
<a href="${j.link2}" class="btn green">Descargar</a>

${admin?`
<div class="admin-actions">
<button onclick="editar('${id}','${j.nombre}','${j.img}','${j.desc}','${j.link1}','${j.link2}')">✏️</button>
<button onclick="eliminar('${id}')">🗑️</button>
</div>`:""}

</div>
</div>`;
});
};

window.agregarJuego = async function(){
let nuevo = {
nombre:nombre.value,
img:img.value,
desc:desc.value,
link1:link1.value,
link2:link2.value
};

if(editIndex == null){
await addDoc(collection(db, "juegos"), nuevo);
}else{
await updateDoc(doc(db,"juegos",editIndex), nuevo);
editIndex = null;
}

cargar();
};

window.editar = function(id,n,i,d,l1,l2){
nombre.value=n;
img.value=i;
desc.value=d;
link1.value=l1;
link2.value=l2;
editIndex=id;
};

window.eliminar = async function(id){
await deleteDoc(doc(db,"juegos",id));
cargar();
};

window.onload = ()=>{
cargar();
};
</script>

</body>
</html>
