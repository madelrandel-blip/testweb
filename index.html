<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Juegos Switch</title>

<style>
:root {
    --bg:#111;
    --card:#1c1c1c;
    --text:#fff;
    --accent:#0074cc;
    --green:#28a745;
}

body {
    margin:0;
    font-family:sans-serif;
    background:var(--bg);
    color:var(--text);
}

/* HEADER */
header{
    padding:20px;
    background:linear-gradient(90deg,#000,#222);
    position:sticky;
    top:0;
    z-index:10;
}

input{
    padding:10px;
    width:250px;
    border-radius:20px;
    border:none;
}

/* FILA NETFLIX */
.row {
    margin:20px 0;
}

.row h2{
    margin-left:20px;
}

/* CONTENEDOR SCROLL */
.row-container{
    display:flex;
    overflow-x:auto;
    scroll-behavior:smooth;
    padding:20px;
    gap:15px;
}

.row-container::-webkit-scrollbar{
    height:6px;
}

.row-container::-webkit-scrollbar-thumb{
    background:#444;
}

/* CARD */
.game{
    min-width:180px;
    background:var(--card);
    border-radius:10px;
    overflow:hidden;
    flex-shrink:0;
    transition:0.3s;
}

.game:hover{
    transform:scale(1.08);
}

.game img{
    width:100%;
}

/* CONTENT */
.content{
    padding:10px;
}

.content h4{
    font-size:14px;
    margin:5px 0;
}

.content p{
    font-size:12px;
    color:#aaa;
}

/* BOTONES */
.btns{
    display:flex;
    gap:5px;
    margin-top:8px;
}

.btn{
    flex:1;
    padding:6px;
    font-size:12px;
    text-align:center;
    border-radius:5px;
    text-decoration:none;
    color:#fff;
}

.blue{ background:var(--accent); }
.green{ background:var(--green); }

/* MOBILE */
@media(max-width:600px){
    .game{
        min-width:140px;
    }
}
</style>
</head>

<body>

<header>
    <h1>🎮 Juegos Switch</h1>
    <input type="text" id="search" placeholder="Buscar...">
</header>

<!-- FILA 1 -->
<div class="row">
    <h2>Populares</h2>
    <div class="row-container" id="row1"></div>
</div>

<!-- FILA 2 -->
<div class="row">
    <h2>Aventura</h2>
    <div class="row-container" id="row2"></div>
</div>

<script>
// 🎮 BASE DE DATOS (AQUÍ AGREGAS JUEGOS)
const juegos = [
{
    nombre:"Zelda BOTW",
    desc:"Exploración en mundo abierto",
    img:"https://art.gametdb.com/switch/box2/US/AAAAA.png",
    cat:"row1",
    link1:"AQUI_LINK_1",
    link2:"AQUI_LINK_2"
},
{
    nombre:"Mario Kart 8",
    desc:"Carreras divertidas",
    img:"https://art.gametdb.com/switch/box/US/AABPA.png",
    cat:"row1",
    link1:"AQUI_LINK_1",
    link2:"AQUI_LINK_2"
},
{
    nombre:"Smash Bros",
    desc:"Batallas épicas",
    img:"https://art.gametdb.com/switch/box/MX/AAABA.png",
    cat:"row2",
    link1:"AQUI_LINK_1",
    link2:"AQUI_LINK_2"
}
];

// ⚡ CARGA DINÁMICA
function cargar(){
    juegos.forEach(j=>{
        let card = document.createElement("div");
        card.className="game";

        card.innerHTML=`
            <img src="${j.img}">
            <div class="content">
                <h4>${j.nombre}</h4>
                <p>${j.desc}</p>
                <div class="btns">
                    <!-- 🔽 EDITA AQUÍ -->
                    <a href="${j.link1}" class="btn blue">Descargar</a>
                    <a href="${j.link2}" class="btn green">Descargar</a>
                </div>
            </div>
        `;

        document.getElementById(j.cat).appendChild(card);
    });
}

cargar();

// 🔍 BUSCADOR
document.getElementById("search").addEventListener("keyup", e=>{
    let val = e.target.value.toLowerCase();

    document.querySelectorAll(".game").forEach(card=>{
        let txt = card.innerText.toLowerCase();
        card.style.display = txt.includes(val) ? "block":"none";
    });
});
</script>

</body>
</html>
