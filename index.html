<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Juegos Nintendo Switch</title>

<style>
:root {
    --bg: #f5f5f5;
    --card: #ffffff;
    --text: #222;
    --accent: #0074cc;
    --green: #28a745;
}

body.dark {
    --bg: #121212;
    --card: #1e1e1e;
    --text: #eaeaea;
    --accent: #4da3ff;
    --green: #34d058;
}

body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
}

/* HEADER */
header {
    background: linear-gradient(135deg, var(--accent), #00c6ff);
    color: white;
    text-align: center;
    padding: 30px 20px;
    position: relative;
}

.toggle-btn {
    position: absolute;
    right: 20px;
    top: 20px;
    background: white;
    border: none;
    padding: 8px 12px;
    border-radius: 20px;
    cursor: pointer;
}

/* BUSCADOR */
.search-box {
    margin-top: 15px;
}

.search-box input {
    padding: 10px;
    width: 250px;
    border-radius: 20px;
    border: none;
}

/* GRID → AHORA MÁS RESPONSIVE */
.game-list {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 15px;
    padding: 20px;
}

/* CARD */
.game-item {
    background: var(--card);
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 6px 15px rgba(0,0,0,0.1);
    opacity: 0;
    transform: translateY(40px);
    transition: 0.5s ease;
}

.game-item.show {
    opacity: 1;
    transform: translateY(0);
}

.game-item:hover {
    transform: scale(1.03);
}

/* IMG */
.game-item img {
    width: 100%;
}

/* CONTENT */
.game-content {
    padding: 10px;
}

.game-content h3 {
    font-size: 15px;
}

.game-content p {
    font-size: 13px;
    color: #777;
}

/* BOTONES */
.btn-group {
    display: flex;
    gap: 8px;
    margin-top: 10px;
}

.download-btn {
    flex: 1;
    padding: 8px;
    text-align: center;
    background: var(--accent);
    color: white;
    border-radius: 6px;
    text-decoration: none;
    font-size: 13px;
}

.green-btn {
    flex: 1;
    padding: 8px;
    text-align: center;
    background: var(--green);
    color: white;
    border-radius: 6px;
    text-decoration: none;
    font-size: 13px;
}

/* FOOTER */
footer {
    text-align: center;
    padding: 15px;
    background: #333;
    color: white;
}
</style>
</head>

<body>

<header>
    <h1>🎮 Juegos Nintendo Switch</h1>
    <button class="toggle-btn" onclick="toggleDark()">🌙</button>

    <div class="search-box">
        <input type="text" id="search" placeholder="Buscar juego...">
    </div>
</header>

<div class="game-list">

    <!-- JUEGO -->
    <div class="game-item">
        <img src="https://art.gametdb.com/switch/box2/US/AAAAA.png">
        <div class="game-content">
            <h3>Zelda Breath of the Wild</h3>
            <p>Mundo abierto lleno de exploración.</p>

            <div class="btn-group">

                <!-- 🔽 PEGA TU LINK DE DESCARGA AQUÍ -->
                <a href="AQUI_TU_LINK_1" class="download-btn">Descargar</a>

                <!-- 🔽 SEGUNDO LINK (OPCIONAL / RESPALDO) -->
                <a href="AQUI_TU_LINK_2" class="green-btn">Descargar</a>

            </div>
        </div>
    </div>

    <!-- DUPLICA ESTE BLOQUE PARA MÁS JUEGOS -->

</div>

<footer>
    <p>© 2026 Juegos Switch</p>
</footer>

<script>
// 🌙 MODO OSCURO
function toggleDark() {
    document.body.classList.toggle("dark");
}

// 🔍 BUSCADOR
document.getElementById("search").addEventListener("keyup", function() {
    let filter = this.value.toLowerCase();
    let games = document.querySelectorAll(".game-item");

    games.forEach(game => {
        let text = game.innerText.toLowerCase();
        game.style.display = text.includes(filter) ? "" : "none";
    });
});

// ✨ ANIMACIÓN EFICIENTE
const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
        if (entry.isIntersecting) {
            entry.target.classList.add("show");
        }
    });
});

document.querySelectorAll(".game-item").forEach(el => {
    observer.observe(el);
});
</script>

</body>
</html>
