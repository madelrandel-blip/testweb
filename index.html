<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luma Switch</title>

<style>
:root{
    --bg:#05070d;
    --card:#0f172a;
    --text:#e0f2ff;
    --accent:#7dd3fc;
    --accent2:#a78bfa;
    --green:#22c55e;
}

/* fondo */
body{
    margin:0;
    font-family:Arial;
    color:var(--text);
    background:
    radial-gradient(2px 2px at 20% 30%, white, transparent),
    radial-gradient(2px 2px at 70% 60%, white, transparent),
    radial-gradient(1px 1px at 40% 80%, white, transparent),
    radial-gradient(circle at 20% 30%, #1e3a8a, transparent),
    radial-gradient(circle at 80% 70%, #581c87, transparent),
    var(--bg);
    background-size:200px 200px;
    animation:starsMove 60s linear infinite;
}
@keyframes starsMove{
    from{background-position:0 0;}
    to{background-position:1000px 1000px;}
}

/* header */
header{
    background:rgba(10,15,30,0.7);
    backdrop-filter: blur(10px);
    padding:15px;
    display:flex;
    align-items:center;
}

.header-btn{
    margin-left:auto;
    display:flex;
    gap:10px;
}

.header-btn button{
    padding:8px 14px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    color:white;
}

/* login */
#loginBox{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.85);
    justify-content:center;
    align-items:center;
}

.login-content{
    background:#0f172a;
    padding:25px;
    border-radius:15px;
    text-align:center;
}

/* 🔥 PANEL ADMIN MODERNO */
#adminPanel{
    display:none;
    background:rgba(10,15,30,0.85);
    padding:20px;
    border-radius:12px;
    margin:20px;
    box-shadow:0 0 20px rgba(0,0,0,0.4);
}

#adminPanel input{
    width:100%;
    padding:10px;
    margin:6px 0;
    border:none;
    border-radius:8px;
    background:#020617;
    color:white;
}

#btnGuardar{
    width:100%;
    margin-top:10px;
    padding:12px;
    border:none;
    border-radius:10px;
    font-weight:bold;
    cursor:pointer;
    color:white;
    background:linear-gradient(135deg,#22c55e,#16a34a);
}

#btnGuardar.editando{
    background:linear-gradient(135deg,#f59e0b,#d97706);
}

/* grid */
.store{
    display:grid;
    grid-template-columns: repeat(auto-fill, minmax(180px,1fr));
    gap:18px;
    padding:20px;
}

/* card */
.card{
    background:rgba(15,23,42,0.8);
    border-radius:10px;
    overflow:hidden;
    transition:0.3s;
    display:flex;
    flex-direction:column;
}
.card:hover{transform:scale(1.05);}
.card img{width:100%;}

.content{
    padding:10px;
    display:flex;
    flex-direction:column;
    flex:1;
}

/* botones */
.btns{
    display:flex;
    gap:6px;
    margin-top:auto;
    opacity:0;
    transform:translateY(10px);
    transition:0.3s;
}
.card:hover .btns{
    opacity:1;
    transform:translateY(0);
}

.btn{
    flex:1;
    padding:7px;
    border-radius:5px;
    color:white;
    border:none;
    cursor:pointer;
}
.blue{background:var(--accent);}
.green{background:var(--green);}

.admin-actions{
    display:flex;
    gap:5px;
    margin-top:5px;
}
</style>
</head>

<body>

<header>
<h1>🌌 Luma Switch</h1>
<div class="header-btn">
<button onclick="abrirLogin()">🔐 Admin</button>
<button onclick="logout()" id="logoutBtn" style="display:none;">🚪 Salir</button>
</div>
</header>

<!-- LOGIN -->
<div id="loginBox">
<div class="login-content">
<input id="user" placeholder="Email">
<input id="pass" type="password" placeholder="Contraseña">
<button onclick="login()">Entrar</button>
<button onclick="cerrarLogin()">Cerrar</button>
</div>
</div>

<!-- PANEL -->
<div id="adminPanel">
<input id="nombre" placeholder="Nombre">
<input id="img" placeholder="Imagen URL">
<input id="desc" placeholder="Descripción">
<input id="link1" placeholder="Link 1">
<input id="link2" placeholder="Link 2">
<button id="btnGuardar" onclick="agregarJuego()">💾 Guardar</button>
</div>

<div class="store" id="store"></div>

<script>
function abrirLogin(){loginBox.style.display="flex";}
function cerrarLogin(){loginBox.style.display="none";}

let admin=false;
let editIndex=null;
let guardando=false;
</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, deleteDoc, doc, updateDoc, query, where, onSnapshot, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCnqFKUPqbcTt0As9atnSQML00ReFgcgbw",
  authDomain: "luma-switch.firebaseapp.com",
  projectId: "luma-switch",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

/* tiempo real */
onSnapshot(collection(db,"juegos"), (snapshot)=>{
let html="";
snapshot.forEach(docSnap=>{
const j=docSnap.data();
const id=docSnap.id;

html+=`
<div class="card">
<img src="${j.img}">
<div class="content">
<h3>${j.nombre}</h3>
<p>${j.desc}</p>

<div class="btns">
<button class="btn blue">Ver</button>
<button class="btn green">Ver</button>
</div>

${admin?`
<div class="admin-actions">
<button onclick="editar('${id}','${j.nombre}','${j.img}','${j.desc}','${j.link1}','${j.link2}')">✏️</button>
<button onclick="eliminar('${id}')">🗑️</button>
</div>`:""}

</div>
</div>`;
});
store.innerHTML=html;
});

onAuthStateChanged(auth,(user)=>{
admin=!!user;
adminPanel.style.display=admin?"block":"none";
logoutBtn.style.display=admin?"inline-block":"none";
});

window.login=async()=>{await signInWithEmailAndPassword(auth,user.value,pass.value);cerrarLogin();}
window.logout=async()=>{await signOut(auth);}

/* guardar */
window.agregarJuego=async()=>{
if(guardando) return;
guardando=true;
btnGuardar.disabled=true;

let nuevo={
nombre:nombre.value,
img:img.value,
desc:desc.value,
link1:link1.value,
link2:link2.value
};

const q=query(collection(db,"juegos"), where("nombre","==",nombre.value));
const snap=await getDocs(q);

if(!snap.empty && editIndex==null){
alert("Este juego ya existe");
guardando=false;
btnGuardar.disabled=false;
return;
}

if(editIndex==null){
await addDoc(collection(db,"juegos"),nuevo);
}else{
await updateDoc(doc(db,"juegos",editIndex),nuevo);
editIndex=null;
}

/* reset UI */
btnGuardar.innerText="💾 Guardar";
btnGuardar.classList.remove("editando");

guardando=false;
btnGuardar.disabled=false;
};

/* editar */
window.editar=(id,n,i,d,l1,l2)=>{
nombre.value=n;
img.value=i;
desc.value=d;
link1.value=l1;
link2.value=l2;
editIndex=id;

btnGuardar.innerText="✏️ Actualizar juego";
btnGuardar.classList.add("editando");

adminPanel.scrollIntoView({behavior:"smooth"});
};

window.eliminar=async(id)=>{
await deleteDoc(doc(db,"juegos",id));
};
</script>

</body>
</html>
