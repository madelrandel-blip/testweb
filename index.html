<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luma Switch</title>

<style>
:root{
    --bg:#05070d;
    --card:#0f172a;
    --text:#e0f2ff;
    --accent:#7dd3fc;
    --accent2:#a78bfa;
    --green:#22c55e;
}

body{
    margin:0;
    font-family:Arial;
    color:var(--text);
    background: radial-gradient(circle at 20% 30%, #1e3a8a, transparent),
                radial-gradient(circle at 80% 70%, #581c87, transparent),
                var(--bg);
}

.stars{position:fixed;width:100%;height:100%;z-index:-1;}
.star{position:absolute;width:2px;height:2px;background:white;animation: twinkle 2s infinite alternate;}
@keyframes twinkle{from{opacity:0.2;}to{opacity:1;}}

header{
    background:rgba(10,15,30,0.7);
    backdrop-filter: blur(10px);
    padding:15px;
    display:flex;
    gap:15px;
    align-items:center;
}

.header-btn{
    margin-left:auto;
    display:flex;
    gap:10px;
}

.header-btn button{
    padding:8px 14px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    color:white;
    transition:0.25s;
}
.header-btn button:hover{transform:scale(1.05);}

/* LOGIN */
#loginBox{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.85);
    justify-content:center;
    align-items:center;
}

.login-content{
    background:#0f172a;
    padding:25px;
    border-radius:15px;
    text-align:center;
    width:280px;
}

.login-content input{
    width:90%;
    padding:10px;
    margin:8px 0;
    border:none;
    border-radius:8px;
}

.login-content button{
    padding:10px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    color:white;
}

.btn-login{background:linear-gradient(135deg,#38bdf8,#6366f1);}
.btn-close{background:rgba(255,255,255,0.1);}

.store{
    display:grid;
    grid-template-columns: repeat(auto-fill, minmax(180px,1fr));
    gap:18px;
    padding:20px;
}

.card{
    background:rgba(15,23,42,0.8);
    border-radius:10px;
    overflow:hidden;
    display:flex;
    flex-direction:column;
}
.card img{width:100%;}

.content{
    padding:10px;
    display:flex;
    flex-direction:column;
}

.btns{
    display:flex;
    gap:6px;
    margin-top:auto;
}

.btn{
    flex:1;
    padding:7px;
    text-align:center;
    font-size:12px;
    border-radius:5px;
    color:white;
    border:none;
    cursor:pointer;
}
.blue{background:var(--accent);}
.green{background:var(--green);}
</style>
</head>

<body>

<header>
<h1>🌌 Luma Switch</h1>
<div class="header-btn">
<button onclick="abrirLogin()">🔐 Admin</button>
<button onclick="logout()" id="logoutBtn" style="display:none;">🚪 Salir</button>
</div>
</header>

<!-- LOGIN -->
<div id="loginBox">
<div class="login-content">
<h3>Admin</h3>
<input id="user" placeholder="Email">
<input id="pass" type="password" placeholder="Contraseña">
<button class="btn-login" onclick="login()">Entrar</button>
<button class="btn-close" onclick="cerrarLogin()">Cerrar</button>
</div>
</div>

<!-- PANEL -->
<div id="adminPanel" style="display:none;">
<input id="nombre" placeholder="Nombre">
<input id="img" placeholder="Imagen URL">
<input id="desc" placeholder="Descripción">
<input id="link1" placeholder="Link 1">
<input id="link2" placeholder="Link 2">
<button id="btnGuardar" onclick="agregarJuego()">Guardar</button>
</div>

<div class="store" id="store"></div>

<script>
function abrirLogin(){loginBox.style.display="flex";}
function cerrarLogin(){loginBox.style.display="none";}
let admin=false, editIndex=null;

/* 🔒 BLOQUEO ANTI DUPLICADOS */
let guardando = false;
</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs, addDoc, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCnqFKUPqbcTt0As9atnSQML00ReFgcgbw",
  authDomain: "luma-switch.firebaseapp.com",
  projectId: "luma-switch",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

onAuthStateChanged(auth, (user) => {
  if(user){
    admin = true;
    adminPanel.style.display = "block";
    logoutBtn.style.display = "inline-block";
  }else{
    admin = false;
    adminPanel.style.display = "none";
    logoutBtn.style.display = "none";
  }
  cargar();
});

window.login = async function(){
await signInWithEmailAndPassword(auth, user.value, pass.value);
cerrarLogin();
};

window.logout = async function(){
await signOut(auth);
};

window.cargar = async function(){
store.innerHTML = "";
const querySnapshot = await getDocs(collection(db, "juegos"));

querySnapshot.forEach((docSnap)=>{
const j = docSnap.data();
const id = docSnap.id;

store.innerHTML += `
<div class="card">
<img src="${j.img}">
<div class="content">
<h3>${j.nombre}</h3>
<p>${j.desc}</p>

<div class="btns">
<button onclick="abrirSafe('${j.link1}')" class="btn blue">Ver</button>
<button onclick="abrirSafe('${j.link2}')" class="btn green">Ver</button>
</div>

</div>
</div>`;
});
};

/* 🔥 FUNCIÓN CORREGIDA */
window.agregarJuego = async function(){

if(guardando) return;
guardando = true;
btnGuardar.disabled = true;

let nuevo = {
nombre:nombre.value,
img:img.value,
desc:desc.value,
link1:link1.value,
link2:link2.value
};

try{
if(editIndex == null){
await addDoc(collection(db, "juegos"), nuevo);
}else{
await updateDoc(doc(db,"juegos",editIndex), nuevo);
editIndex = null;
}
}catch(e){
console.error(e);
alert("Error al guardar");
}

guardando = false;
btnGuardar.disabled = false;
cargar();
};

window.onload = ()=>{
cargar();
};
</script>

</body>
</html>
