<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luma Switch</title>

<style>
:root{
    --bg:#05070d;
    --card:#0f172a;
    --text:#e0f2ff;
    --accent:#7dd3fc;
    --accent2:#a78bfa;
    --green:#22c55e;
}

body{
    margin:0;
    font-family:Arial;
    color:var(--text);
    background: radial-gradient(circle at 20% 30%, #1e3a8a, transparent),
                radial-gradient(circle at 80% 70%, #581c87, transparent),
                var(--bg);
}

header{
    background:rgba(10,15,30,0.7);
    backdrop-filter: blur(10px);
    padding:15px;
    display:flex;
    align-items:center;
}

.header-btn{
    margin-left:auto;
}

.header-btn button{
    padding:8px 14px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    color:white;
}

#loginBox{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.85);
    justify-content:center;
    align-items:center;
}

.login-content{
    background:#0f172a;
    padding:25px;
    border-radius:15px;
    text-align:center;
}

.store{
    display:grid;
    grid-template-columns: repeat(auto-fill, minmax(180px,1fr));
    gap:18px;
    padding:20px;
}

.card{
    background:rgba(15,23,42,0.8);
    border-radius:10px;
    overflow:hidden;
}

.card img{width:100%;}

.content{padding:10px;}

.btns{display:flex; gap:5px;}

.btn{
    flex:1;
    padding:6px;
    border:none;
    border-radius:5px;
    color:white;
    cursor:pointer;
}
.blue{background:var(--accent);}
.green{background:var(--green);}
</style>
</head>

<body>

<header>
<h1>🌌 Luma Switch</h1>
<div class="header-btn">
<button onclick="abrirLogin()">🔐 Admin</button>
<button onclick="logout()" id="logoutBtn" style="display:none;">🚪 Salir</button>
</div>
</header>

<div id="loginBox">
<div class="login-content">
<h3>Admin</h3>
<input id="user" placeholder="Email">
<input id="pass" type="password" placeholder="Contraseña">
<button onclick="login()">Entrar</button>
<button onclick="cerrarLogin()">Cerrar</button>
</div>
</div>

<div id="adminPanel" style="display:none;">
<input id="nombre" placeholder="Nombre">
<input id="img" placeholder="Imagen URL">
<input id="desc" placeholder="Descripción">
<input id="link1" placeholder="Link 1">
<input id="link2" placeholder="Link 2">
<button id="btnGuardar" onclick="agregarJuego()">Guardar</button>
</div>

<div class="store" id="store"></div>

<script>
function abrirLogin(){loginBox.style.display="flex";}
function cerrarLogin(){loginBox.style.display="none";}
let admin=false, editIndex=null;

/* 🔒 BLOQUEO DOBLE CLICK */
let guardando = false;
</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs, addDoc, deleteDoc, doc, updateDoc, query, where } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCnqFKUPqbcTt0As9atnSQML00ReFgcgbw",
  authDomain: "luma-switch.firebaseapp.com",
  projectId: "luma-switch",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

onAuthStateChanged(auth, (user) => {
  if(user){
    admin = true;
    adminPanel.style.display = "block";
    logoutBtn.style.display = "inline-block";
  }else{
    admin = false;
    adminPanel.style.display = "none";
    logoutBtn.style.display = "none";
  }
  cargar();
});

window.login = async function(){
await signInWithEmailAndPassword(auth, user.value, pass.value);
cerrarLogin();
};

window.logout = async function(){
await signOut(auth);
};

window.cargar = async function(){
store.innerHTML = "";
const querySnapshot = await getDocs(collection(db, "juegos"));

querySnapshot.forEach((docSnap)=>{
const j = docSnap.data();

store.innerHTML += `
<div class="card">
<img src="${j.img}">
<div class="content">
<h3>${j.nombre}</h3>
<p>${j.desc}</p>
<div class="btns">
<button class="btn blue">Ver</button>
<button class="btn green">Ver</button>
</div>
</div>
</div>`;
});
};

/* 🚫 ANTI DUPLICADOS + 🔒 BLOQUEO */
window.agregarJuego = async function(){

if(guardando) return;
guardando = true;
btnGuardar.disabled = true;

let nombreJuego = nombre.value.trim().toLowerCase();

let nuevo = {
nombre: nombre.value,
img: img.value,
desc: desc.value,
link1: link1.value,
link2: link2.value
};

try{

// 🔍 BUSCAR DUPLICADOS
const q = query(collection(db, "juegos"), where("nombre", "==", nombre.value));
const snapshot = await getDocs(q);

if(!snapshot.empty && editIndex == null){
alert("❌ Este juego ya existe");
guardando = false;
btnGuardar.disabled = false;
return;
}

// 💾 GUARDAR
if(editIndex == null){
await addDoc(collection(db, "juegos"), nuevo);
}else{
await updateDoc(doc(db,"juegos",editIndex), nuevo);
editIndex = null;
}

}catch(e){
console.error(e);
alert("Error al guardar");
}

guardando = false;
btnGuardar.disabled = false;
cargar();
};

window.onload = ()=>{
cargar();
};
</script>

</body>
</html>
