<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luma Switch</title>

<style>
:root{
    --bg:#05070d;
    --card:#0f172a;
    --text:#e0f2ff;
    --accent:#7dd3fc;
    --accent2:#a78bfa;
    --green:#22c55e;
}

body{
    margin:0;
    font-family:Arial;
    color:var(--text);
    background: radial-gradient(circle at 20% 30%, #1e3a8a, transparent),
                radial-gradient(circle at 80% 70%, #581c87, transparent),
                var(--bg);
}

/* CANVAS ESTRELLAS */
#stars{
    position:fixed;
    inset:0;
    z-index:0;
    pointer-events:none;
}

/* HEADER */
header{
    background:rgba(10,15,30,0.7);
    backdrop-filter: blur(10px);
    padding:15px;
    display:flex;
    align-items:center;
    position:relative;
    z-index:1;
    gap:15px;
    flex-wrap:wrap;
}

/* BUSCADOR */
#buscador{
    padding:10px 14px;
    border-radius:12px;
    border:none;
    outline:none;
    background:#020617;
    color:white;
    border:1px solid rgba(255,255,255,0.1);
    width:220px;
    max-width:100%;
}

.header-btn{
    margin-left:auto;
    display:flex;
    gap:10px;
}

.header-btn button{
    padding:10px 16px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    color:white;
    transition:0.25s;
    font-size:14px;
}
.header-btn button:hover{
    transform:scale(1.08);
    box-shadow:0 0 10px var(--accent);
}

/* LOGIN MODERNO */
#loginBox{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.6);
    backdrop-filter: blur(6px);
    justify-content:center;
    align-items:center;
    z-index:10;
}

.login-content{
    background:rgba(15,23,42,0.75);
    border:1px solid rgba(125,211,252,0.2);
    backdrop-filter: blur(14px);
    padding:30px 25px;
    border-radius:20px;
    width:300px;
    max-width:90%;
    box-shadow:0 0 25px rgba(125,211,252,0.15);
    animation:fadeIn 0.4s ease;
    text-align:center;
}

.login-content input{
    width:100%;
    padding:12px;
    margin:8px 0;
    border-radius:12px;
}

/* PANEL */
#adminPanel{
    display:none;
    background:rgba(10,15,30,0.8);
    padding:20px;
    position:relative;
    z-index:1;
}
#adminPanel input{
    padding:10px;
    margin:5px;
    border-radius:8px;
    width:100%;
    max-width:300px;
}

/* GRID */
.store{
    display:grid;
    grid-template-columns: repeat(auto-fill, minmax(180px,1fr));
    gap:18px;
    padding:20px;
    position:relative;
    z-index:1;
}

/* CARD */
.card{
    background:rgba(15,23,42,0.8);
    border-radius:14px;
    overflow:hidden;
    transition:0.3s;
    display:flex;
    flex-direction:column;
}
.card:hover{transform:scale(1.05);}

.card img{
    width:100%;
    height:140px;
    object-fit:cover;
}

.content{
    padding:12px;
}

.content h3{
    font-size:15px;
}

.content p{
    font-size:13px;
}

.btn{
    padding:10px;
    font-size:13px;
}

/* 📱 MEJORAS ANDROID */
@media (max-width:600px){

    header{
        flex-direction:column;
        align-items:flex-start;
    }

    .header-btn{
        width:100%;
        justify-content:space-between;
        margin-left:0;
    }

    #buscador{
        width:100%;
    }

    .store{
        grid-template-columns: repeat(2,1fr);
        gap:12px;
        padding:12px;
    }

    .card{
        border-radius:16px;
    }

    .card img{
        height:120px;
    }

    .btn{
        padding:12px;
        font-size:14px;
    }

    .login-content{
        width:100%;
    }

    #adminPanel{
        padding:15px;
    }

}

/* 📱 EXTRA: móviles muy pequeños */
@media (max-width:380px){
    .store{
        grid-template-columns:1fr;
    }
}
</style>
</head>

<body>

<canvas id="stars"></canvas>

<header>
<h1>🌌 Luma Switch</h1>
<input type="text" id="buscador" placeholder="Buscar...">
<div class="header-btn">
<button onclick="abrirLogin()">🔐 Admin</button>
<button onclick="logout()" id="logoutBtn" style="display:none;">🚪 Salir</button>
</div>
</header>
