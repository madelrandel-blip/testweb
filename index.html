<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Luma Switch - Juegos, Emuladores y Bios</title>
<meta name="description" content="Luma Switch - Descarga juegos, emuladores y bios fácilmente.">

<style>
:root{
    --bg:#05070d;
    --card:#0f172a;
    --text:#e0f2ff;
    --accent:#7dd3fc;
    --accent2:#a78bfa;
    --green:#22c55e;
}

body{
    margin:0;
    font-family:Arial;
    color:var(--text);
    background: radial-gradient(circle at 20% 30%, #1e3a8a, transparent),
                radial-gradient(circle at 80% 70%, #581c87, transparent),
                var(--bg);
}

/* estrellas */
.stars{position:fixed;width:100%;height:100%;z-index:-1;}
.star{position:absolute;width:2px;height:2px;background:white;animation: twinkle 2s infinite alternate;}
@keyframes twinkle{from{opacity:0.2;}to{opacity:1;}}

/* header */
header{
    background:rgba(10,15,30,0.7);
    backdrop-filter: blur(10px);
    padding:15px;
    display:flex;
    gap:15px;
    align-items:center;
}

.search{padding:8px;border-radius:5px;border:none;}

.header-btn{
    margin-left:auto;
    display:flex;
    gap:10px;
}

.header-btn button{
    padding:8px 14px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    background:linear-gradient(45deg,var(--accent),var(--accent2));
    color:white;
    display:flex;
    align-items:center;
    gap:6px;
    transition:0.3s;
}

/* botón activo */
.header-btn button.active{
    box-shadow:0 0 10px var(--accent);
    transform:scale(1.05);
}

/* animación pestañas */
.fade{
    animation:fadeIn 0.35s ease;
}
@keyframes fadeIn{
    from{opacity:0; transform:translateY(10px);}
    to{opacity:1; transform:translateY(0);}
}

/* login */
#loginBox{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.8);
    justify-content:center;
    align-items:center;
}
.login-content{
    background:#0f172a;
    padding:25px;
    border-radius:10px;
    text-align:center;
}
.login-content input{
    width:90%;
    padding:8px;
    margin:6px 0;
    border:none;
    border-radius:5px;
}

.login-content button{
    padding:10px 16px;
    margin:8px 5px 0;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-weight:bold;
    color:white;
}
.login-content button:first-of-type{
    background:linear-gradient(135deg,#38bdf8,#6366f1);
}
.login-content button:last-of-type{
    background:rgba(255,255,255,0.1);
}

/* panel */
#adminPanel{display:none;background:rgba(10,15,30,0.8);padding:20px;}
#adminPanel input{padding:8px;margin:5px;border-radius:5px;border:none;}

/* grid */
.store{
    display:grid;
    grid-template-columns: repeat(auto-fill, minmax(180px,1fr));
    gap:18px;
    padding:20px;
}

/* card */
.card{
    background:rgba(15,23,42,0.8);
    border-radius:10px;
    overflow:hidden;
    transition:0.3s;
    display:flex;
    flex-direction:column;
}
.card:hover{transform:scale(1.05);}
.card img{width:100%;}

.content{padding:10px;display:flex;flex-direction:column;flex:1;}
.content h3{font-size:14px;margin:5px 0;}
.content p{font-size:12px;color:#9aa7b1;}

.btns{
    display:flex;
    gap:6px;
    margin-top:auto;
    opacity:0;
    transform:translateY(10px);
    transition:0.3s;
}
.card:hover .btns{opacity:1;transform:translateY(0);}

.btn{
    flex:1;
    padding:7px;
    text-align:center;
    font-size:12px;
    border-radius:5px;
    text-decoration:none;
    color:white;
}
.blue{background:var(--accent);}
.green{background:var(--green);}

.admin-actions{display:flex;gap:5px;margin-top:5px;}
</style>
</head>

<body>

<div class="stars" id="stars"></div>

<header>
<h1>🌌 Luma Switch</h1>
<input type="text" id="search" class="search" placeholder="Buscar...">

<div class="header-btn">
<button id="btnInicio" onclick="mostrarTienda()">🏠 Inicio</button>
<button id="btnEmu" onclick="mostrarEmuladores()">🎮 Emuladores</button>
<button id="btnBios" onclick="mostrarBios()">🧩 Bios/Keys</button>
<button onclick="abrirLogin()">🔐 Admin</button>
<button onclick="logout()" id="logoutBtn" style="display:none;">🚪 Salir</button>
</div>
</header>

<!-- contenido -->
<div class="store fade" id="store"></div>
<div class="store fade" id="emuladores" style="display:none;"></div>
<div class="store fade" id="bios" style="display:none;"></div>

<script>
// estrellas
for(let i=0;i<120;i++){
let s=document.createElement("div");
s.className="star";
s.style.top=Math.random()*100+"%";
s.style.left=Math.random()*100+"%";
stars.appendChild(s);
}

// botones activos
function activar(btn){
document.querySelectorAll(".header-btn button").forEach(b=>b.classList.remove("active"));
btn.classList.add("active");
}

// pestañas con animación
function mostrarTienda(){
store.style.display="grid";
emuladores.style.display="none";
bios.style.display="none";
store.classList.add("fade");
activar(btnInicio);
}

function mostrarEmuladores(){
store.style.display="none";
emuladores.style.display="grid";
bios.style.display="none";
emuladores.classList.add("fade");
activar(btnEmu);
}

function mostrarBios(){
store.style.display="none";
emuladores.style.display="none";
bios.style.display="grid";
bios.classList.add("fade");
activar(btnBios);
}

// activar inicio al cargar
window.onload = () => activar(btnInicio);
</script>

</body>
</html>
