<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luma Switch</title>

<style>
:root{
    --bg:#05070d;
    --card:#0f172a;
    --text:#e0f2ff;
    --accent:#7dd3fc;
    --accent2:#a78bfa;
    --green:#22c55e;
}

body{
    margin:0;
    font-family:Arial;
    color:var(--text);
    background: radial-gradient(circle at 20% 30%, #1e3a8a, transparent),
                radial-gradient(circle at 80% 70%, #581c87, transparent),
                var(--bg);
}

#stars{
    position:fixed;
    inset:0;
    z-index:0;
    pointer-events:none;
}

/* HEADER */
header{
    background:rgba(10,15,30,0.7);
    backdrop-filter: blur(10px);
    padding:15px;
    display:flex;
    align-items:center;
    position:relative;
    z-index:1;
    gap:15px;
}

/* 🔧 FIX LOGO */
.logo h1{
    display:flex;
    align-items:center;
    gap:10px;
    font-size:20px;
    margin:0;
}

.logo-img{
    height:28px;
    width:auto;
    object-fit:contain;
}

#buscador{
    padding:8px 12px;
    border-radius:10px;
    border:none;
    outline:none;
    background:#020617;
    color:white;
    border:1px solid rgba(255,255,255,0.1);
    width:200px;
}

.header-btn{
    margin-left:auto;
    display:flex;
    gap:10px;
}

.header-btn button{
    padding:8px 14px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    color:white;
    transition:0.25s;
}
.header-btn button:hover{
    transform:scale(1.08);
    box-shadow:0 0 10px var(--accent);
}

/* LOGIN */
#loginBox{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.6);
    backdrop-filter: blur(6px);
    justify-content:center;
    align-items:center;
    z-index:10;
}

.login-content{
    background:rgba(15,23,42,0.75);
    border:1px solid rgba(125,211,252,0.2);
    backdrop-filter: blur(14px);
    padding:30px 25px;
    border-radius:20px;
    width:300px;
    box-shadow:0 0 25px rgba(125,211,252,0.15);
    animation:fadeIn 0.4s ease;
    text-align:center;
}

.login-content input{
    width:100%;
    padding:10px;
    margin:8px 0;
    border-radius:10px;
    border:none;
    outline:none;
    background:#020617;
    color:white;
    border:1px solid rgba(255,255,255,0.08);
}

.login-content button{
    width:100%;
    padding:10px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    color:white;
}

@keyframes fadeIn{
    from{opacity:0; transform:translateY(10px);}
    to{opacity:1; transform:translateY(0);}
}

/* PANEL */
#adminPanel{
    display:none;
    background:rgba(10,15,30,0.8);
    padding:20px;
    position:relative;
    z-index:1;
}

#adminPanel input{
    padding:8px;
    margin:5px;
    border-radius:5px;
    border:none;
}

/* GRID */
.store{
    display:grid;
    grid-template-columns: repeat(auto-fill, minmax(180px,1fr));
    gap:18px;
    padding:20px;
    position:relative;
    z-index:1;
}

/* CARD */
.card{
    background:rgba(15,23,42,0.8);
    border-radius:10px;
    overflow:hidden;
    transition:0.3s;
    display:flex;
    flex-direction:column;
    position:relative;
}
.card:hover{transform:scale(1.05);}

.card img{width:100%;}

/* BADGE */
.badge{
    position:absolute;
    top:6px;
    left:6px;
    background:gold;
    color:black;
    padding:3px 6px;
    font-size:10px;
    border-radius:6px;
    font-weight:bold;
}

.content{
    padding:10px;
    display:flex;
    flex-direction:column;
    flex:1;
}

.content h3{font-size:14px;margin:5px 0;}
.content p{font-size:12px;color:#9aa7b1;}

.btns{
    display:flex;
    gap:6px;
    margin-top:auto;
    opacity:0;
    transform:translateY(10px);
    transition:0.3s;
}
.card:hover .btns{
    opacity:1;
    transform:translateY(0);
}

.btn{
    flex:1;
    padding:7px;
    font-size:12px;
    border-radius:5px;
    color:white;
    border:none;
    cursor:pointer;
}
.blue{background:var(--accent);}
.green{background:var(--green);}

.admin-actions{
    display:flex;
    gap:5px;
    margin-top:5px;
}
</style>

</head>

<body>

<canvas id="stars"></canvas>

<header>
<div class="logo">
  <h1>
    <img src="https://media.discordapp.net/attachments/1419649387948150826/1496590717789933568/Luma..webp?format=png"
    alt="Luma Logo"
    class="logo-img">
    Luma Switch
  </h1>
</div>

<input type="text" id="buscador" placeholder="Buscar...">

<div class="header-btn">
<button onclick="abrirLogin()">🔐 Admin</button>
<button onclick="logout()" id="logoutBtn" style="display:none;">🚪 Salir</button>
</div>
</header>

<!-- TODO LO DEMÁS SE MANTIENE EXACTAMENTE IGUAL -->

</body>
</html>
