<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luma Switch</title>

<style>
:root{
    --bg:#05070d;
    --card:#0f172a;
    --text:#e0f2ff;
    --accent:#7dd3fc;
    --accent2:#a78bfa;
    --green:#22c55e;
}

body{
    margin:0;
    font-family:Arial;
    color:var(--text);
    background: radial-gradient(circle at 20% 30%, #1e3a8a, transparent),
                radial-gradient(circle at 80% 70%, #581c87, transparent),
                var(--bg);
}

#stars{
    position:fixed;
    inset:0;
    z-index:0;
    pointer-events:none;
}

header{
    background:rgba(10,15,30,0.7);
    backdrop-filter: blur(10px);
    padding:15px;
    display:flex;
    align-items:center;
    position:relative;
    z-index:1;
    gap:15px;
}

#buscador{
    padding:8px 12px;
    border-radius:10px;
    border:none;
    outline:none;
    background:#020617;
    color:white;
    border:1px solid rgba(255,255,255,0.1);
    width:200px;
}

.header-btn{
    margin-left:auto;
    display:flex;
    gap:10px;
}

.header-btn button{
    padding:8px 14px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    color:white;
    transition:0.25s;
}
.header-btn button:hover{
    transform:scale(1.08);
    box-shadow:0 0 10px var(--accent);
}

#loginBox{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.6);
    backdrop-filter: blur(6px);
    justify-content:center;
    align-items:center;
    z-index:10;
}

.login-content{
    background:rgba(15,23,42,0.75);
    border:1px solid rgba(125,211,252,0.2);
    backdrop-filter: blur(14px);
    padding:30px 25px;
    border-radius:20px;
    width:300px;
    box-shadow:0 0 25px rgba(125,211,252,0.15);
    text-align:center;
}

.login-content input{
    width:100%;
    padding:10px;
    margin:8px 0;
    border-radius:10px;
    border:none;
    outline:none;
    background:#020617;
    color:white;
    border:1px solid rgba(255,255,255,0.08);
}

.login-content button{
    width:100%;
    padding:10px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    color:white;
}

#adminPanel{
    display:none;
    background:rgba(10,15,30,0.8);
    padding:20px;
    position:relative;
    z-index:1;
}

.store{
    display:grid;
    grid-template-columns: repeat(auto-fill, minmax(180px,1fr));
    gap:18px;
    padding:20px;
    position:relative;
    z-index:1;
}

.card{
    background:rgba(15,23,42,0.8);
    border-radius:10px;
    overflow:hidden;
    transition:0.3s;
    display:flex;
    flex-direction:column;
    position:relative;
}
.card:hover{transform:scale(1.05);}

.card img{width:100%;}

.badge{
    position:absolute;
    top:5px;
    left:5px;
    background:gold;
    color:black;
    padding:3px 6px;
    font-size:10px;
    border-radius:5px;
}

.content{
    padding:10px;
    display:flex;
    flex-direction:column;
    flex:1;
}

.btns{
    display:flex;
    gap:6px;
    margin-top:auto;
    opacity:0;
    transform:translateY(10px);
    transition:0.3s;
}
.card:hover .btns{
    opacity:1;
    transform:translateY(0);
}

.btn{
    flex:1;
    padding:7px;
    font-size:12px;
    border-radius:5px;
    color:white;
    border:none;
    cursor:pointer;
}
.blue{background:var(--accent);}
.green{background:var(--green);}
</style>

</head>

<body>

<canvas id="stars"></canvas>

<header>
<div class="logo">
  <h1>
    <img src="https://media.discordapp.net/attachments/1419649387948150826/1496590717789933568/Luma..webp?ex=69ea7038&is=69e91eb8&hm=1c965e73aa583ba83623fea531507bd15febc8522d488547f3f78b1d7e868a20&=&format=png"
    alt="Luma Logo"
    class="logo-img">
    Luma Switch
  </h1>
</div>

<input type="text" id="buscador" placeholder="Buscar...">

<div class="header-btn">
<button onclick="abrirLogin()">🔐 Admin</button>
<button onclick="logout()" id="logoutBtn" style="display:none;">🚪 Salir</button>
</div>
</header>

<div id="loginBox">
<div class="login-content">
<h3>Panel Admin</h3>
<input id="user" placeholder="Email">
<input id="pass" type="password" placeholder="Contraseña">
<button onclick="login()">Entrar</button>
<button onclick="cerrarLogin()">Cerrar</button>
</div>
</div>

<div id="adminPanel">
<input id="nombre" placeholder="Nombre">
<input id="img" placeholder="Imagen URL">
<input id="desc" placeholder="Descripción">
<input id="link1" placeholder="Link 1">
<input id="link2" placeholder="Link 2">
<button id="btnGuardar" onclick="agregarJuego()">Guardar</button>
</div>

<div class="store" id="store"></div>

<script>
let juegosData = [];
buscador.addEventListener("input", ()=>{
    const texto = buscador.value.toLowerCase();
    render(juegosData.filter(j =>
        j.nombre.toLowerCase().includes(texto) ||
        j.desc.toLowerCase().includes(texto)
    ));
});

function render(lista){
    let html="";
    lista.forEach(j=>{
        html+=`
        <div class="card">
        ${j.destacado ? '<div class="badge">⭐ Destacado</div>' : ''}
        <img src="${j.img}">
        <div class="content">
        <h3>${j.nombre}</h3>
        <p>${j.desc}</p>

        <div class="btns">
        <button class="btn blue">Ver enlace</button>
        <button class="btn green">Ver enlace</button>
        </div>

        ${admin?`
        <div class="admin-actions">
        <button onclick="eliminar('${j.id}')">🗑️</button>
        <button onclick="toggleDestacado('${j.id}', ${j.destacado})">⭐</button>
        </div>`:""}

        </div>
        </div>`;
    });
    store.innerHTML = html;
}
</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs, addDoc, deleteDoc, doc, updateDoc, query, where } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const app = initializeApp({
  apiKey: "AIza...",
  authDomain: "luma-switch.firebaseapp.com",
  projectId: "luma-switch",
});

const db = getFirestore(app);
const auth = getAuth(app);

let admin=false;

onAuthStateChanged(auth, (user)=>{
    admin=!!user;
    adminPanel.style.display = admin?"block":"none";
    logoutBtn.style.display = admin?"inline-block":"none";
    cargar();
});

window.toggleDestacado = async (id, estado)=>{
await updateDoc(doc(db,"juegos",id),{
    destacado: !estado
});
cargar();
};

window.cargar = async ()=>{
const snapshot=await getDocs(collection(db,"juegos"));
juegosData=[];
snapshot.forEach(d=>{
let j=d.data();
j.id=d.id;
juegosData.push(j);
});

// ⭐ ORDEN DESTACADOS + ALFABÉTICO
juegosData.sort((a,b)=>{
if((b.destacado?1:0)!==(a.destacado?1:0)){
return (b.destacado?1:0)-(a.destacado?1:0);
}
return (a.nombre||"").localeCompare(b.nombre||"",'es',{sensitivity:'base'});
});

render(juegosData);
};

window.agregarJuego = async ()=>{
await addDoc(collection(db,"juegos"),{
nombre:nombre.value,
img:img.value,
desc:desc.value,
link1:link1.value,
link2:link2.value,
destacado:false
});
cargar();
};
</script>

</body>
</html>
