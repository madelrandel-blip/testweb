<header>
    <h1>🎮 Tienda Switch</h1>
    <input type="text" id="search" class="search" placeholder="Buscar juego...">

    <!-- LOGIN BTN -->
    <button id="loginBtn" style="margin-left:auto;">Admin</button>
    <button id="logoutBtn" style="display:none;">Cerrar sesión</button>
</header>

<!-- LOGIN MODAL -->
<div id="loginModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:#0008; justify-content:center; align-items:center;">
    <div style="background:#1b2838; padding:20px; border-radius:8px;">
        <h3>Login Admin</h3>
        <input id="user" placeholder="Usuario"><br><br>
        <input id="pass" type="password" placeholder="Contraseña"><br><br>
        <button onclick="login()">Entrar</button>
        <button onclick="cerrarLogin()">Cerrar</button>
    </div>
</div>

<!-- PANEL ADMIN -->
<div id="adminPanel" style="display:none; padding:20px;">
    <h2>Panel Admin</h2>

    <input id="nombre" placeholder="Nombre"><br><br>
    <input id="img" placeholder="URL Imagen"><br><br>
    <input id="desc" placeholder="Descripción"><br><br>
    <input id="link1" placeholder="Link 1"><br><br>
    <input id="link2" placeholder="Link 2"><br><br>

    <button onclick="agregar()">Agregar juego</button>
</div>

<div class="store" id="store"></div>

<script>
const ADMIN_USER = "Mad";
const ADMIN_PASS = "Papel#19";

let juegos = JSON.parse(localStorage.getItem("juegos")) || [
{nombre:"Zelda BOTW", img:"https://art.gametdb.com/switch/box2/US/AAAAA.png", desc:"Mundo abierto", link1:"#", link2:"#"},
];

// LOGIN UI
document.getElementById("loginBtn").onclick = ()=> {
    document.getElementById("loginModal").style.display="flex";
}

function cerrarLogin(){
    document.getElementById("loginModal").style.display="none";
}

// LOGIN
function login(){
    let u=document.getElementById("user").value;
    let p=document.getElementById("pass").value;

    if(u===ADMIN_USER && p===ADMIN_PASS){
        document.getElementById("adminPanel").style.display="block";
        document.getElementById("logoutBtn").style.display="inline";
        cerrarLogin();
    } else {
        alert("Datos incorrectos");
    }
}

// LOGOUT
document.getElementById("logoutBtn").onclick=()=>{
    document.getElementById("adminPanel").style.display="none";
    document.getElementById("logoutBtn").style.display="none";
}

// GUARDAR
function guardar(){
    localStorage.setItem("juegos", JSON.stringify(juegos));
}

// AGREGAR
function agregar(){
    let nuevo={
        nombre:document.getElementById("nombre").value,
        img:document.getElementById("img").value,
        desc:document.getElementById("desc").value,
        link1:document.getElementById("link1").value,
        link2:document.getElementById("link2").value
    };

    juegos.push(nuevo);
    guardar();
    cargar();
}

// CARGAR
function cargar(){
    let cont=document.getElementById("store");
    cont.innerHTML="";

    juegos.forEach((j,i)=>{
        let card=document.createElement("div");
        card.className="card";

        card.innerHTML=`
            <img src="${j.img}">
            <div class="content">
                <h3>${j.nombre}</h3>
                <p>${j.desc}</p>

                <div class="btns">
                    <a href="${j.link1}" class="btn blue">Descargar</a>
                    <a href="${j.link2}" class="btn green">Descargar</a>
                </div>

                ${document.getElementById("adminPanel").style.display==="block" ? 
                `<button onclick="editar(${i})">Editar</button>` : ""}
            </div>
        `;

        cont.appendChild(card);
    });
}

// EDITAR
function editar(i){
    let j=juegos[i];

    document.getElementById("nombre").value=j.nombre;
    document.getElementById("img").value=j.img;
    document.getElementById("desc").value=j.desc;
    document.getElementById("link1").value=j.link1;
    document.getElementById("link2").value=j.link2;

    juegos.splice(i,1);
    guardar();
}

cargar();

// BUSCADOR
document.getElementById("search").addEventListener("keyup", e=>{
    let val=e.target.value.toLowerCase();

    document.querySelectorAll(".card").forEach(c=>{
        c.style.display = c.innerText.toLowerCase().includes(val) ? "block":"none";
    });
});
</script>
