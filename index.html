<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luma Switch</title>

<style>
:root{
    --bg:#05070d;
    --card:#0f172a;
    --text:#e0f2ff;
    --accent:#7dd3fc;
    --accent2:#a78bfa;
    --green:#22c55e;
}

body{
    margin:0;
    font-family:Arial;
    color:var(--text);
    background: radial-gradient(circle at 20% 30%, #1e3a8a, transparent),
                radial-gradient(circle at 80% 70%, #581c87, transparent),
                var(--bg);
}

/* ESTRELLAS */
#stars{
    position:fixed;
    inset:0;
    z-index:0;
    pointer-events:none;
}

/* HEADER */
header{
    background:rgba(10,15,30,0.7);
    backdrop-filter: blur(10px);
    padding:15px;
    display:flex;
    align-items:center;
    position:relative;
    z-index:1;
}

.header-btn{
    margin-left:auto;
    display:flex;
    gap:10px;
}

.header-btn button{
    padding:8px 14px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    color:white;
}

/* 🔍 BUSCADOR */
.search-box{
    padding:10px 20px;
    position:relative;
    z-index:1;
}

.search-box input{
    width:100%;
    padding:10px;
    border-radius:10px;
    border:none;
    background:#020617;
    color:white;
    outline:none;
    border:1px solid rgba(255,255,255,0.1);
}

/* LOGIN MODERNO */
#loginBox{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.6);
    backdrop-filter: blur(6px);
    justify-content:center;
    align-items:center;
    z-index:10;
}

.login-content{
    background:rgba(15,23,42,0.75);
    border:1px solid rgba(125,211,252,0.2);
    backdrop-filter: blur(14px);
    padding:30px;
    border-radius:20px;
    width:300px;
}

.login-content input{
    width:100%;
    padding:10px;
    margin:8px 0;
    border-radius:10px;
    border:none;
    background:#020617;
    color:white;
}

.login-content button{
    width:100%;
    padding:10px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    color:white;
}

/* PANEL */
#adminPanel{
    display:none;
    padding:20px;
    position:relative;
    z-index:1;
}

.store{
    display:grid;
    grid-template-columns: repeat(auto-fill, minmax(180px,1fr));
    gap:18px;
    padding:20px;
    position:relative;
    z-index:1;
}

.card{
    background:rgba(15,23,42,0.8);
    border-radius:10px;
    overflow:hidden;
}

.card img{width:100%;}

.content{padding:10px;}

.btn{
    padding:7px;
    border:none;
    border-radius:5px;
    color:white;
}

.blue{background:var(--accent);}
.green{background:var(--green);}
</style>
</head>

<body>

<canvas id="stars"></canvas>

<header>
<h1>🌌 Luma Switch</h1>
<div class="header-btn">
<button onclick="abrirLogin()">🔐 Admin</button>
<button onclick="logout()" id="logoutBtn" style="display:none;">🚪 Salir</button>
</div>
</header>

<!-- 🔍 BUSCADOR -->
<div class="search-box">
<input type="text" id="buscador" placeholder="Buscar juegos...">
</div>

<div id="loginBox">
<div class="login-content">
<h3>Panel Admin</h3>
<input id="user" placeholder="Email">
<input id="pass" type="password" placeholder="Contraseña">
<button onclick="login()">Entrar</button>
<button onclick="cerrarLogin()">Cerrar</button>
</div>
</div>

<div id="adminPanel">
<input id="nombre" placeholder="Nombre">
<input id="img" placeholder="Imagen URL">
<input id="desc" placeholder="Descripción">
<input id="link1" placeholder="Link 1">
<input id="link2" placeholder="Link 2">
<button id="btnGuardar" onclick="agregarJuego()">Guardar</button>
</div>

<div class="store" id="store"></div>

<script>
function abrirLogin(){loginBox.style.display="flex";}
function cerrarLogin(){loginBox.style.display="none";}

let admin=false;
let editIndex=null;
let guardando=false;
let cargando=false;

/* 🔍 FILTRO EN TIEMPO REAL */
buscador.addEventListener("input", ()=>{
let filtro = buscador.value.toLowerCase();
document.querySelectorAll(".card").forEach(card=>{
card.style.display = card.innerText.toLowerCase().includes(filtro) ? "block" : "none";
});
});
</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs, addDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCnqFKUPqbcTt0As9atnSQML00ReFgcgbw",
  authDomain: "luma-switch.firebaseapp.com",
  projectId: "luma-switch",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

onAuthStateChanged(auth, (user) => {
  admin = !!user;
  adminPanel.style.display = admin ? "block" : "none";
  logoutBtn.style.display = admin ? "inline-block" : "none";
  cargar();
});

window.login = async ()=>{
await signInWithEmailAndPassword(auth,user.value,pass.value);
cerrarLogin();
};

window.logout = async ()=>{ await signOut(auth); };

window.cargar = async ()=>{
const snapshot=await getDocs(collection(db,"juegos"));
let html="";
snapshot.forEach(docSnap=>{
const j=docSnap.data();
html+=`<div class="card">
<img src="${j.img}">
<div class="content">
<h3>${j.nombre}</h3>
<p>${j.desc}</p>
</div></div>`;
});
store.innerHTML=html;
};
</script>

<script>
const canvas = document.getElementById("stars");
const ctx = canvas.getContext("2d");
let stars = [];
function resize(){
canvas.width=innerWidth;
canvas.height=innerHeight;
}
resize();
addEventListener("resize",resize);

for(let i=0;i<80;i++){
stars.push({x:Math.random()*innerWidth,y:Math.random()*innerHeight,r:Math.random()*1.2,s:Math.random()*0.3});
}

function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height);
ctx.fillStyle="white";
stars.forEach(s=>{
ctx.beginPath();
ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
ctx.fill();
s.y+=s.s;
if(s.y>canvas.height){s.y=0;s.x=Math.random()*canvas.width;}
});
requestAnimationFrame(draw);
}
draw();
</script>

</body>
</html>
