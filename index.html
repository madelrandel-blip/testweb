<style>
:root{
    --bg:#05070d;
    --card:#0f172a;
    --text:#e0f2ff;
    --accent:#7dd3fc;
    --accent2:#a78bfa;
    --green:#22c55e;
}

body{
    margin:0;
    font-family:Arial;
    color:var(--text);
    background: radial-gradient(circle at 20% 30%, #1e3a8a, transparent),
                radial-gradient(circle at 80% 70%, #581c87, transparent),
                var(--bg);
}

/* CANVAS ESTRELLAS */
#stars{
    position:fixed;
    inset:0;
    z-index:0;
    pointer-events:none;
}

/* HEADER */
header{
    background:rgba(10,15,30,0.7);
    backdrop-filter: blur(10px);
    padding:15px;
    display:flex;
    align-items:center;
    position:relative;
    z-index:1;
    gap:15px;
}

/* BUSCADOR */
#buscador{
    padding:8px 12px;
    border-radius:10px;
    border:none;
    outline:none;
    background:#020617;
    color:white;
    border:1px solid rgba(255,255,255,0.1);
    width:200px;
}

.header-btn{
    margin-left:auto;
    display:flex;
    gap:10px;
}

.header-btn button{
    padding:8px 14px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    color:white;
    transition:0.25s;
}
.header-btn button:hover{
    transform:scale(1.08);
    box-shadow:0 0 10px var(--accent);
}

/* LOGIN MODERNO */
#loginBox{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.6);
    backdrop-filter: blur(6px);
    justify-content:center;
    align-items:center;
    z-index:10;
}

.login-content{
    background:rgba(15,23,42,0.75);
    border:1px solid rgba(125,211,252,0.2);
    backdrop-filter: blur(14px);
    padding:30px 25px;
    border-radius:20px;
    width:300px;
    box-shadow:0 0 25px rgba(125,211,252,0.15);
    animation:fadeIn 0.4s ease;
    text-align:center;
}

.login-content h3{
    margin-bottom:15px;
    font-weight:600;
}

.login-content input{
    width:100%;
    padding:10px;
    margin:8px 0;
    border-radius:10px;
    border:none;
    outline:none;
    background:#020617;
    color:white;
    border:1px solid rgba(255,255,255,0.08);
    transition:0.25s;
}

.login-content input:focus{
    border:1px solid var(--accent);
    box-shadow:0 0 10px var(--accent);
}

.login-content button{
    width:100%;
    padding:10px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    color:white;
    transition:0.25s;
}

.login-content button:hover{
    transform:scale(1.05);
    box-shadow:0 0 12px var(--accent);
}

@keyframes fadeIn{
    from{opacity:0; transform:translateY(10px);}
    to{opacity:1; transform:translateY(0);}
}

/* PANEL */
#adminPanel{
    display:none;
    background:rgba(10,15,30,0.8);
    padding:20px;
    position:relative;
    z-index:1;
}
#adminPanel input{
    padding:8px;
    margin:5px;
    border-radius:5px;
    border:none;
}

/* modo edición */
#btnGuardar.editando{
    background:linear-gradient(135deg,#f59e0b,#d97706);
}

/* GRID */
.store{
    display:grid;
    grid-template-columns: repeat(auto-fill, minmax(180px,1fr));
    gap:18px;
    padding:20px;
    position:relative;
    z-index:1;
}

/* CARD */
.card{
    background:rgba(15,23,42,0.8);
    border-radius:10px;
    overflow:hidden;
    transition:0.3s;
    display:flex;
    flex-direction:column;
}
.card:hover{transform:scale(1.05);}

/* 👇 ajuste leve para uniformidad visual */
.card img{
    width:100%;
    height:120px;
    object-fit:cover;
}

.content{
    padding:10px;
    display:flex;
    flex-direction:column;
    flex:1;
    justify-content:space-between; /* 👈 alineación consistente */
}

/* 👇 títulos con altura fija */
.content h3{
    font-size:14px;
    margin:5px 0;

    display:-webkit-box;
    -webkit-line-clamp:2;
    -webkit-box-orient:vertical;
    overflow:hidden;

    min-height:34px;
}

/* 👇 descripciones con altura fija */
.content p{
    font-size:12px;
    color:#9aa7b1;

    display:-webkit-box;
    -webkit-line-clamp:2;
    -webkit-box-orient:vertical;
    overflow:hidden;

    min-height:30px;
}

.btns{
    display:flex;
    gap:6px;
    margin-top:auto;
    opacity:0;
    transform:translateY(10px);
    transition:0.3s;
}
.card:hover .btns{
    opacity:1;
    transform:translateY(0);
}

.btn{
    flex:1;
    padding:7px;
    font-size:12px;
    border-radius:5px;
    color:white;
    border:none;
    cursor:pointer;
}
.blue{background:var(--accent);}
.green{background:var(--green);}

.admin-actions{
    display:flex;
    gap:5px;
    margin-top:5px;
}
</style>
