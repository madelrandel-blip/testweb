<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Luma Switch</title>

<style>
:root{
    --bg:#05070d;
    --card:#0f172a;
    --text:#e0f2ff;
    --accent:#7dd3fc;
    --accent2:#a78bfa;
    --green:#22c55e;
}

body{
    margin:0;
    font-family:Arial;
    color:var(--text);
    background: radial-gradient(circle at 20% 30%, #1e3a8a, transparent),
                radial-gradient(circle at 80% 70%, #581c87, transparent),
                var(--bg);
}

header{
    background:rgba(10,15,30,0.7);
    backdrop-filter: blur(10px);
    padding:15px;
    display:flex;
    align-items:center;
}

.header-btn{
    margin-left:auto;
    display:flex;
    gap:10px;
}

.header-btn button{
    padding:8px 14px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    color:white;
}

/* LOGIN */
#loginBox{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.85);
    justify-content:center;
    align-items:center;
}

.login-content{
    background:#0f172a;
    padding:25px;
    border-radius:15px;
    text-align:center;
    width:280px;
}

.login-content input{
    width:90%;
    padding:10px;
    margin:8px 0;
    border:none;
    border-radius:8px;
}

.btn-login{
    background:linear-gradient(135deg,#38bdf8,#6366f1);
    padding:10px;
    border:none;
    border-radius:10px;
    color:white;
    cursor:pointer;
}

.btn-close{
    background:rgba(255,255,255,0.1);
    padding:10px;
    border:none;
    border-radius:10px;
    color:white;
    cursor:pointer;
}

/* PANEL */
#adminPanel{
    display:none;
    background:rgba(10,15,30,0.8);
    padding:20px;
}

#adminPanel input{
    padding:8px;
    margin:5px;
    border-radius:5px;
    border:none;
}

/* GRID */
.store{
    display:grid;
    grid-template-columns: repeat(auto-fill, minmax(180px,1fr));
    gap:18px;
    padding:20px;
}

/* CARD */
.card{
    background:rgba(15,23,42,0.8);
    border-radius:10px;
    overflow:hidden;
    display:flex;
    flex-direction:column;
}
.card img{width:100%;}

.content{
    padding:10px;
}

.admin-actions{
    display:flex;
    gap:5px;
    margin-top:5px;
}
</style>
</head>

<body>

<header>
<h1>🌌 Luma Switch</h1>

<div class="header-btn">
<button onclick="abrirLogin()">🔐 Admin</button>
<button onclick="logout()" id="logoutBtn" style="display:none;">🚪 Salir</button>
</div>
</header>

<!-- LOGIN -->
<div id="loginBox">
<div class="login-content">
<h3>Admin</h3>
<input id="user" placeholder="Email">
<input id="pass" type="password" placeholder="Contraseña">
<button class="btn-login" onclick="login()">Entrar</button>
<button class="btn-close" onclick="cerrarLogin()">Cerrar</button>
</div>
</div>

<!-- PANEL -->
<div id="adminPanel">
<input id="nombre" placeholder="Nombre">
<input id="img" placeholder="Imagen URL">
<input id="desc" placeholder="Descripción">
<input id="link1" placeholder="Link 1">
<input id="link2" placeholder="Link 2">
<button onclick="guardarJuego()">Guardar</button>
</div>

<div class="store" id="store"></div>

<script>
function abrirLogin(){loginBox.style.display="flex";}
function cerrarLogin(){loginBox.style.display="none";}

let admin=false;
let editId=null;
</script>

<!-- 🔥 FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { 
getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc 
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import { 
getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged 
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCnqFKUPqbcTt0As9atnSQML00ReFgcgbw",
  authDomain: "luma-switch.firebaseapp.com",
  projectId: "luma-switch"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

/* LOGIN */
window.login = async ()=>{
try{
await signInWithEmailAndPassword(auth,user.value,pass.value);
cerrarLogin();
}catch{
alert("Error al iniciar sesión");
}
};

window.logout = async ()=>{
await signOut(auth);
};

/* CONTROL ADMIN */
onAuthStateChanged(auth, (user)=>{
admin = !!user;
adminPanel.style.display = admin ? "block":"none";
logoutBtn.style.display = admin ? "inline-block":"none";
cargar();
});

/* CARGAR JUEGOS */
window.cargar = async ()=>{
const snapshot = await getDocs(collection(db,"juegos"));
let html="";

snapshot.forEach(docSnap=>{
const j = docSnap.data();
const id = docSnap.id;

html+=`
<div class="card">
<img src="${j.img}">
<div class="content">
<h3>${j.nombre}</h3>
<p>${j.desc}</p>

<div class="admin-actions">
${admin?`
<button onclick="editarJuego('${id}','${j.nombre}','${j.img}','${j.desc}','${j.link1}','${j.link2}')">✏️</button>
<button onclick="eliminarJuego('${id}')">🗑️</button>
`:""}
</div>

</div>
</div>
`;
});

store.innerHTML=html;
};

/* GUARDAR */
window.guardarJuego = async ()=>{
let data={
nombre:nombre.value,
img:img.value,
desc:desc.value,
link1:link1.value,
link2:link2.value
};

if(editId==null){
await addDoc(collection(db,"juegos"),data);
}else{
await updateDoc(doc(db,"juegos",editId),data);
editId=null;
}

cargar();
};

/* EDITAR */
window.editarJuego = (id,n,i,d,l1,l2)=>{
nombre.value=n;
img.value=i;
desc.value=d;
link1.value=l1;
link2.value=l2;
editId=id;
};

/* ELIMINAR */
window.eliminarJuego = async(id)=>{
await deleteDoc(doc(db,"juegos",id));
cargar();
};

</script>

</body>
</html>
