<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luma Switch</title>

<style>
:root{
    --bg:#05070d;
    --card:#0f172a;
    --text:#e0f2ff;
    --accent:#7dd3fc;
    --accent2:#a78bfa;
    --green:#22c55e;
}

body{
    margin:0;
    font-family:Arial;
    color:var(--text);
    background: radial-gradient(circle at 20% 30%, #1e3a8a, transparent),
                radial-gradient(circle at 80% 70%, #581c87, transparent),
                var(--bg);
}

/* HEADER */
header{
    background:rgba(10,15,30,0.7);
    backdrop-filter: blur(10px);
    padding:15px;
    display:flex;
    align-items:center;
}

.header-btn{
    margin-left:auto;
    display:flex;
    gap:10px;
}

.header-btn button{
    padding:8px 14px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    color:white;
    transition:0.25s;
}
.header-btn button:hover{
    transform:scale(1.08);
    box-shadow:0 0 10px var(--accent);
}

/* LOGIN MODERNO */
#loginBox{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.85);
    justify-content:center;
    align-items:center;
    backdrop-filter: blur(6px);
}

.login-content{
    background:linear-gradient(145deg,#0f172a,#020617);
    padding:25px;
    border-radius:16px;
    text-align:center;
    width:280px;
    box-shadow:0 0 25px rgba(0,0,0,0.8);
    animation:fadeIn 0.3s ease;
}

.login-content input{
    width:90%;
    padding:10px;
    margin:8px 0;
    border:none;
    border-radius:10px;
    background:#020617;
    color:white;
    outline:none;
}

.login-content input:focus{
    box-shadow:0 0 8px var(--accent);
}

.btn-login{
    background:linear-gradient(135deg,#38bdf8,#6366f1);
    border:none;
    padding:10px;
    border-radius:12px;
    color:white;
    cursor:pointer;
    width:100%;
    margin-top:8px;
    transition:0.25s;
}

.btn-login:hover{
    transform:scale(1.05);
    box-shadow:0 0 12px var(--accent);
}

.btn-close{
    background:rgba(255,255,255,0.08);
    border:none;
    padding:10px;
    border-radius:12px;
    color:white;
    cursor:pointer;
    width:100%;
    margin-top:6px;
    transition:0.25s;
}

.btn-close:hover{
    background:rgba(255,255,255,0.15);
}

/* PANEL */
#adminPanel{
    display:none;
    background:rgba(10,15,30,0.8);
    padding:20px;
}
#adminPanel input{
    padding:8px;
    margin:5px;
    border-radius:5px;
    border:none;
}

/* GRID */
.store{
    display:grid;
    grid-template-columns: repeat(auto-fill, minmax(180px,1fr));
    gap:18px;
    padding:20px;
}

/* CARD */
.card{
    background:rgba(15,23,42,0.8);
    border-radius:10px;
    overflow:hidden;
    transition:0.3s;
    display:flex;
    flex-direction:column;
}
.card:hover{transform:scale(1.05);}
.card img{width:100%;}

/* CONTENT */
.content{
    padding:10px;
    display:flex;
    flex-direction:column;
    flex:1;
}

.content h3{font-size:14px;margin:5px 0;}
.content p{font-size:12px;color:#9aa7b1;}

/* BOTONES */
.btns{
    display:flex;
    gap:6px;
    margin-top:auto;
    opacity:0;
    transform:translateY(10px);
    transition:0.3s;
}
.card:hover .btns{
    opacity:1;
    transform:translateY(0);
}

.btn{
    flex:1;
    padding:7px;
    font-size:12px;
    border-radius:5px;
    color:white;
    border:none;
    cursor:pointer;
}
.btn:hover{transform:scale(1.05);}

.blue{background:var(--accent);}
.green{background:var(--green);}

.admin-actions{
    display:flex;
    gap:5px;
    margin-top:5px;
}
</style>
</head>

<body>

<header>
<h1>🌌 Luma Switch</h1>
<div class="header-btn">
<button onclick="abrirLogin()">🔐 Admin</button>
<button onclick="logout()" id="logoutBtn" style="display:none;">🚪 Salir</button>
</div>
</header>

<!-- LOGIN -->
<div id="loginBox">
<div class="login-content">
<h3>Panel Admin</h3>
<input id="user" placeholder="Email">
<input id="pass" type="password" placeholder="Contraseña">
<button class="btn-login" onclick="login()">Entrar</button>
<button class="btn-close" onclick="cerrarLogin()">Cerrar</button>
</div>
</div>

<!-- PANEL -->
<div id="adminPanel">
<input id="nombre" placeholder="Nombre">
<input id="img" placeholder="Imagen URL">
<input id="desc" placeholder="Descripción">
<input id="link1" placeholder="Link 1">
<input id="link2" placeholder="Link 2">
<button id="btnGuardar" onclick="agregarJuego()">Guardar</button>
</div>

<div class="store" id="store"></div>

<script>
function abrirLogin(){loginBox.style.display="flex";}
function cerrarLogin(){loginBox.style.display="none";}

let admin=false;
let editIndex=null;
let guardando=false;
let cargando=false;
</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs, addDoc, deleteDoc, doc, updateDoc, query, where } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCnqFKUPqbcTt0As9atnSQML00ReFgcgbw",
  authDomain: "Tluma-switch.firebaseapp.com",
  projectId: "luma-switch",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

onAuthStateChanged(auth, (user) => {
  admin = !!user;
  adminPanel.style.display = admin ? "block" : "none";
  logoutBtn.style.display = admin ? "inline-block" : "none";
  cargar();
});

window.login = async ()=>{
await signInWithEmailAndPassword(auth,user.value,pass.value);
cerrarLogin();
};

window.logout = async ()=>{
await signOut(auth);
};

window.cargar = async ()=>{
if(cargando) return;
cargando = true;

const snapshot=await getDocs(collection(db,"juegos"));
let html="";

snapshot.forEach(docSnap=>{
const j=docSnap.data();
const id=docSnap.id;

html+=`
<div class="card">
<img src="${j.img}">
<div class="content">
<h3>${j.nombre}</h3>
<p>${j.desc}</p>

<div class="btns">
<a href="${j.link1}" class="btn blue">Descargar</a>
<a href="${j.link2}" class="btn green">Descargar</a>
</div>

${admin?`
<div class="admin-actions">
<button onclick='editarJuego(${JSON.stringify({
  id:id,
  nombre:j.nombre,
  img:j.img,
  desc:j.desc,
  link1:j.link1,
  link2:j.link2
})})'>✏️</button>
<button onclick="eliminar('${id}')">🗑️</button>
</div>`:""}

</div>
</div>`;
});

store.innerHTML=html;
cargando=false;
};

window.agregarJuego = async function(){
if(guardando) return;
guardando=true;
btnGuardar.disabled=true;

let nuevo={
nombre:nombre.value,
img:img.value,
desc:desc.value,
link1:link1.value,
link2:link2.value
};

try{
const q=query(collection(db,"juegos"), where("nombre","==",nombre.value));
const snap=await getDocs(q);

if(!snap.empty && editIndex==null){
alert("Este juego ya existe");
guardando=false;
btnGuardar.disabled=false;
return;
}

if(editIndex==null){
await addDoc(collection(db,"juegos"),nuevo);
}else{
await updateDoc(doc(db,"juegos",editIndex),nuevo);
editIndex=null;
}

}catch(e){console.error(e);}

guardando=false;
btnGuardar.disabled=false;
cargar();
};

window.editarJuego = (j)=>{
nombre.value=j.nombre;
img.value=j.img;
desc.value=j.desc;
link1.value=j.link1;
link2.value=j.link2;
editIndex=j.id;
};

window.eliminar=async(id)=>{
await deleteDoc(doc(db,"juegos",id));
cargar();
};
</script>

</body>
</html>
