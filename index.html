<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tienda Switch</title>

<style>
:root{
    --bg:#0b0f14;
    --card:#1b2838;
    --text:#c7d5e0;
    --accent:#66c0f4;
    --green:#5ba32b;
}

body{
    margin:0;
    font-family:Arial, sans-serif;
    background:var(--bg);
    color:var(--text);
}

/* HEADER */
header{
    background:#171a21;
    padding:15px;
    display:flex;
    flex-wrap:wrap;
    align-items:center;
    gap:15px;
}

.search{
    padding:8px;
    border-radius:5px;
    border:none;
}

/* GRID */
.store{
    display:grid;
    grid-template-columns: repeat(auto-fill, minmax(180px,1fr));
    gap:18px;
    padding:20px;
}

/* CARD */
.card{
    background:var(--card);
    border-radius:6px;
    overflow:hidden;
    transition:0.3s;
}

.card:hover{
    transform:scale(1.04);
}

/* IMG */
.card img{
    width:100%;
}

/* CONTENIDO SIEMPRE VISIBLE */
.content{
    padding:10px;
}

.content h3{
    font-size:14px;
    margin:5px 0;
}

.content p{
    font-size:12px;
    color:#9aa7b1;
}

/* BOTONES */
.btns{
    display:flex;
    gap:6px;
    margin-top:8px;
}

.btn{
    flex:1;
    padding:7px;
    text-align:center;
    font-size:12px;
    border-radius:4px;
    text-decoration:none;
    color:white;
}

.blue{ background:var(--accent); }
.green{ background:var(--green); }

/* MOBILE MEJORADO */
@media(max-width:600px){
    .store{
        grid-template-columns: repeat(2,1fr);
    }
}
</style>
</head>

<body>

<header>
    <h1>🎮 Tienda Switch</h1>
    <input type="text" id="search" class="search" placeholder="Buscar juego...">
</header>

<div class="store" id="store"></div>

<script>
// 🎮 JUEGOS
const juegos = [
{nombre:"Zelda BOTW", img:"https://art.gametdb.com/switch/box2/US/AAAAA.png", desc:"Mundo abierto", link1:"#", link2:"#"},
{nombre:"Zelda TOTK", img:"https://art.gametdb.com/switch/box/US/AXN7A.png", desc:"Aventura", link1:"#", link2:"#"},
{nombre:"Mario Kart 8", img:"https://art.gametdb.com/switch/box/US/AABPA.png", desc:"Carreras", link1:"#", link2:"#"},
{nombre:"Smash Ultimate", img:"https://art.gametdb.com/switch/box/MX/AAABA.png", desc:"Lucha", link1:"#", link2:"#"},
{nombre:"Mario Odyssey", img:"https://art.gametdb.com/switch/box/US/AAACA.png", desc:"Aventura", link1:"#", link2:"#"},
{nombre:"Pokemon Scarlet", img:"https://art.gametdb.com/switch/box/US/ALZXA.png", desc:"Pokemon", link1:"#", link2:"#"},
{nombre:"Animal Crossing", img:"https://art.gametdb.com/switch/box/US/ACBAA.png", desc:"Simulación", link1:"#", link2:"#"},
{nombre:"Metroid Dread", img:"https://art.gametdb.com/switch/box/US/AYL8A.png", desc:"Acción", link1:"#", link2:"#"},
{nombre:"Kirby Forgotten Land", img:"https://art.gametdb.com/switch/box/US/ARZGA.png", desc:"Plataformas", link1:"#", link2:"#"},
{nombre:"Minecraft", img:"https://art.gametdb.com/switch/box/US/AFQEA.png", desc:"Sandbox", link1:"#", link2:"#"}
];

// ⚡ CARGA DINÁMICA
function cargar(){
    let cont = document.getElementById("store");
    cont.innerHTML="";

    juegos.forEach(j=>{
        let card=document.createElement("div");
        card.className="card";

        card.innerHTML=`
            <img src="${j.img}">
            <div class="content">
                <h3>${j.nombre}</h3>
                <p>${j.desc}</p>

                <div class="btns">

                    <!-- 🔽 PON TU LINK AQUÍ -->
                    <a href="${j.link1}" class="btn blue">Descargar</a>

                    <!-- 🔽 LINK SECUNDARIO -->
                    <a href="${j.link2}" class="btn green">Descargar</a>

                </div>
            </div>
        `;

        cont.appendChild(card);
    });
}
cargar();

// 🔍 BUSCADOR
document.getElementById("search").addEventListener("keyup", e=>{
    let val=e.target.value.toLowerCase();

    document.querySelectorAll(".card").forEach(c=>{
        c.style.display = c.innerText.toLowerCase().includes(val) ? "block":"none";
    });
});
</script>

</body>
</html>
